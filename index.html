  function save(){
    const nm=(name||'').trim();
    if(nm.length<2){ setMsg(t('profile.name.short')); return; }
    if(!isCleanName(nm)){ setMsg(t('profile.name.bad')); return; }
    setMsg(null); setSaved(true);
    onSave({ display_name:nm, avatar:av });
    setTimeout(()=>setSaved(false),1800);
  }
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
        <button className="modal__close" onClick={onClose} aria-label={t('common.close')}>×</button>
        <div className="modal__kicker">{t('profile.kicker')}</div>
        <div className="modal__title">{t('profile.title')}</div>

        <div className="prof-head">
          <div className="prof-ava" style={avStyle(av)}>{avContent(av)}
            <div className="prof-ava__cam" onClick={()=>fileRef.current&&fileRef.current.click()} title={t('profile.avatar.upload')}>📷</div>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:11,color:'var(--subtle)',display:'block',marginBottom:5}}>{t('profile.displayname')}</label>
            <input className="prof-name-input" value={name} maxLength={22} placeholder={t('profile.displayname.ph')} onChange={e=>setName(e.target.value)}/>
          </div>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={pickFile}/>
        <div style={{fontSize:11,color:'var(--subtle)',marginBottom:6}}>{busy?t('profile.avatar.uploading'):t('profile.avatar.preset')}</div>
        <div className="ava-grid">
          {AVATARS.map(a=>(
            <button key={a.id} className={'ava-opt'+(av===a.id?' on':'')} style={{background:a.c}} onClick={()=>setAv(a.id)}>{a.e}</button>
          ))}
        </div>
        {msg && <div className="auth-msg err" style={{marginTop:10}}>{msg==='>3MB'?'Máx. 3MB':(msg==='err'?t('auth.err.generic'):msg)}</div>}
        <div style={{textAlign:'center',margin:'14px 0 4px'}}>
          <button className="btn btn--gold" onClick={save} disabled={busy}>{saved?t('common.saved'):t('common.save')}</button>
        </div>
        {!user && <p className="disclaimer" style={{marginTop:6}}>{t('profile.local.note')} <a onClick={onWantLogin} style={{color:'var(--gold)',cursor:'pointer',textDecoration:'underline'}}>{t('result.savecta.link')}</a>.</p>}

        <div className="attrs__title" style={{marginTop:20}}>{t('profile.stats.title')}</div>
        <div className="stat-grid">
          <div className="stat-box"><div className="stat-box__n">{st.teams||0}</div><div className="stat-box__l">{t('profile.stat.teams')}</div></div>
          <div className="stat-box"><div className="stat-box__n">{st.bestPoints||0}</div><div className="stat-box__l">{t('profile.stat.best')}</div></div>
          <div className="stat-box"><div className="stat-box__n">{st.longest||0}</div><div className="stat-box__l">{t('profile.stat.streak')}</div></div>
          <div className="stat-box"><div className="stat-box__n">{Math.round((st.bestProb||0))}%</div><div className="stat-box__l">{t('profile.stat.prob')}</div></div>
        </div>

        <div className="attrs__title" style={{marginTop:18}}>{t('profile.badges.title')} <span style={{color:'var(--subtle)',fontWeight:400,fontSize:12}}>· {t('profile.badges.count',{a:earned.length,b:BADGES.length})}</span></div>
        <div className="badge-grid">
          {BADGES.map(b=>{ const got=earned.indexOf(b.id)>=0; const bt=badgeText(b,lang); return (
            <div key={b.id} className={'badge-cell '+(got?'earned':'locked')} title={bt.desc}>
              {got && <span className="badge-cell__chk">✓</span>}
              <div className="badge-cell__ic">{b.icon}</div>
              <div className="badge-cell__n">{bt.name}</div>
              <div className="badge-cell__d">{bt.desc}</div>
            </div>
          ); })}
        </div>
      </div>
    </div>
  );
}

/* ====== RÉCORDS (ranking global, muro de registro) ====== */
function RecordsModal({ user, profile, onClose, onWantLogin }){
  const t=useT();
  const [rows,setRows]=useState(null); const [err,setErr]=useState(false);
  useEffect(()=>{
    if(!user) return;
    (async()=>{ try{ const r=await fetchLeaderboard(50); if(r.error||!r.data){ setErr(true); setRows([]); } else { setRows(r.data); } }catch(e){ setErr(true); setRows([]); } })();
  },[user]);
  const myId = user?user.id:null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
        <button className="modal__close" onClick={onClose} aria-label={t('common.close')}>×</button>
        <div className="modal__kicker">{t('records.kicker')}</div>
        <div className="modal__title">{t('records.title')}</div>
        {!user ? (
          <div className="gate">
            <div className="gate__lock">🔒</div>
            <div className="modal__title" style={{fontSize:'1.3rem',marginTop:8}}>{t('records.gate.title')}</div>
            <p style={{maxWidth:380,margin:'8px auto 0'}}>{t('records.gate.text')}</p>
            <div className="gate__blur">
              <table className="rec-table"><thead><tr><th>#</th><th>{t('records.col.player')}</th><th>{t('records.col.points')}</th></tr></thead>
                <tbody>{[98,95,93,91,90].map((p,i)=>(<tr key={i}><td className={'rec-rank'+(i===0?' top':'')}>{i+1}</td><td>★★★★★</td><td className="rec-pts">{p}</td></tr>))}</tbody>
              </table>
              <div className="gate__overlay">
                <button className="btn btn--gold" onClick={onWantLogin}>{t('records.gate.cta')}</button>
              </div>
            </div>
          </div>
        ) : (
          <div>
            <p style={{marginTop:2}}>{t('records.subtitle')}</p>
            {rows===null && <p className="hist-empty">{t('common.loading')}</p>}
            {rows!==null && rows.length===0 && <p className="hist-empty">{t('records.empty')}{err && <span><br/><span style={{fontSize:11}}>{t('records.demo.note')}</span></span>}</p>}
            {rows!==null && rows.length>0 && (
              <table className="rec-table">
                <thead><tr><th>{t('records.col.rank')}</th><th>{t('records.col.player')}</th><th>{t('records.col.points')}</th><th>{t('records.col.verdict')}</th></tr></thead>
                <tbody>
                  {rows.map((r,i)=>{ const mine=myId&&r.user_id===myId; const av=r.avatar||'ball'; return (
                    <tr key={i} className={mine?'you':''}>
                      <td className={'rec-rank'+(i<3?' top':'')}>{i+1}</td>
                      <td><div className="rec-player"><span className="rec-ava" style={avStyle(av)}>{avContent(av)}</span>{r.display_name||'Panenkita'}{mine?(' · '+t('records.you')):''}</div></td>
                      <td className="rec-pts">{r.points}</td>
                      <td style={{fontSize:12,color:'var(--muted)'}}>{r.verdict}</td>
                    </tr>
                  ); })}
                </tbody>
              </table>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function BadgeToast({ badge }){
  const t=useT(); const lang=useLang();
  if(!badge) return null; const bt=badgeText(badge,lang);
  return (<div className="badge-toast"><div className="badge-toast__ic">{badge.icon}</div><div><div className="badge-toast__k">{t('toast.newbadge')}</div><div className="badge-toast__n">{bt.name}</div></div></div>);
}

/* ====== POP-UP KO-FI ====== */
function KofiModal({ onClose }){
  const t=useT();
  const href = KOFI_USERNAME ? ('https://ko-fi.com/'+KOFI_USERNAME) : 'https://ko-fi.com';
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <button className="modal__close" onClick={onClose} aria-label={t('common.close')}>×</button>
        <div className="kofi-cup">☕</div>
        <div className="modal__kicker">{t('kofi.kicker')}</div>
        <div className="modal__title">{t('kofi.title')}</div>
        <p style={{marginTop:8}}>{t('kofi.body')}</p>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:18}}>
          <a className="btn btn--gold" href={href} target="_blank" rel="noopener" onClick={()=>{ track('kofi_click'); onClose(); }}>{t('kofi.cta')}</a>
          <button className="btn btn--ghost" onClick={onClose}>{t('kofi.no')}</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState('landing');
  const [roster,setRoster]=useState([]);
  const [howto,setHowto]=useState(false);
  const [genius,setGenius]=useState(false);
  const [fmtId,setFmtId]=useState('8');
  const [f11Form,setF11Form]=useState('4-3-3');
  const [user,setUser]=useState(null);
  const [authOpen,setAuthOpen]=useState(false);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [profileOpen,setProfileOpen]=useState(false);
  const [recordsOpen,setRecordsOpen]=useState(false);
  const [histOpen,setHistOpen]=useState(false);
  const [kofiOpen,setKofiOpen]=useState(false);
  const [legalDoc,setLegalDoc]=useState(null);
  const [lang,setLang]=useState(detectLang());
  const [profile,setProfile]=useState(()=>{ try{ return JSON.parse(localStorage.getItem(PROFILE_KEY))||null; }catch(e){ return null; } });
  const [stats,setStats]=useState(()=>loadStats());
  const [newBadge,setNewBadge]=useState(null);
  const [consent,setConsent]=useState(()=>{ try{ return localStorage.getItem(CONSENT_KEY); }catch(e){ return null; } });
  const sound=useSound();
  const T=(k,v)=>tr(k,lang,v);

  useEffect(()=>{ CUR_LANG=lang; try{ localStorage.setItem('invictos_lang',lang); }catch(e){} try{ document.documentElement.lang=lang; }catch(e){} },[lang]);

  useEffect(()=>{
    if(!AUTH_ENABLED) return;
    sb.auth.getSession().then(({data})=>{ setUser(data.session?data.session.user:null); });
    const r = sb.auth.onAuthStateChange((_e,session)=>{ setUser(session?session.user:null); });
    return ()=>{ try{ r.data.subscription.unsubscribe(); }catch(e){} };
  },[]);
  // sincroniza perfil/estadísticas con el backend al iniciar sesión
  useEffect(()=>{
    if(!(AUTH_ENABLED && user)) return;
    (async()=>{
      const p=await getProfile(user.id);
      if(p){ setProfile({display_name:p.display_name||'',avatar:p.avatar||'ball'}); if(p.stats) setStats(p.stats); }
      else {
        const lp=profile||{display_name:(user.email?user.email.split('@')[0]:''),avatar:'ball'};
        const ls=stats||blankStats(); setProfile(lp);
        upsertProfile(user.id,{display_name:lp.display_name,avatar:lp.avatar,stats:ls});
      }
    })();
  },[user]);
  useEffect(()=>{ track('page_view',{ screen: screen }); },[screen]);
  // pop-up Ko-fi: tras terminar un equipo, una vez al día (no intrusivo)
  useEffect(()=>{
    if(screen!=='result' || !KOFI_USERNAME) return;
    let seen=null; try{ seen=localStorage.getItem('invictos_kofi_seen'); }catch(e){}
    if(seen===todayStr()) return;
    const tm=setTimeout(()=>{ setKofiOpen(true); try{ localStorage.setItem('invictos_kofi_seen',todayStr()); }catch(e){} }, 2600);
    return ()=>clearTimeout(tm);
  },[screen]);

  function setConsentChoice(granted){
    const v = granted?'granted':'denied';
    try{ localStorage.setItem(CONSENT_KEY,v); }catch(e){}
    applyConsent(granted); setConsent(v); track('consent_'+(granted?'accept':'reject'));
  }
  async function doSignOut(){ try{ await authSignOut(); }catch(e){} setDrawerOpen(false); setProfileOpen(false); }
  async function doDeleteData(){
    if(!window.confirm('⚠️ '+T('history.deleteall')+' — '+(lang==='es'?'esto es permanente. ¿Continuar?':'this is permanent. Continue?'))) return;
    try{ await deleteAccountData(); }catch(e){}
    window.alert(T('result.saved'));
    setHistOpen(false);
  }
  function saveProfile(patch){
    const np=Object.assign({display_name:'',avatar:'ball'},profile,patch);
    setProfile(np); try{ localStorage.setItem(PROFILE_KEY,JSON.stringify(np)); }catch(e){}
    if(AUTH_ENABLED && user) upsertProfile(user.id,{display_name:np.display_name,avatar:np.avatar,stats:stats||blankStats()});
  }
  function handlePlay(rec){
    const before=stats||blankStats(); const beforeE=earnedBadges(before);
    const after=recordPlay(before,rec); setStats(after);
    try{ localStorage.setItem(STATS_KEY,JSON.stringify(after)); }catch(e){}
    const afterE=earnedBadges(after); const fresh=afterE.find(id=>beforeE.indexOf(id)<0);
    if(fresh){ const b=BADGES.find(x=>x.id===fresh); setNewBadge(b); setTimeout(()=>setNewBadge(null),4200); }
    if(AUTH_ENABLED && user){
      const dn=(profile&&profile.display_name)||(user.email?user.email.split('@')[0]:'Panenkita');
      const avx=(profile&&profile.avatar)||'ball';
      upsertProfile(user.id,{display_name:dn,avatar:avx,stats:after});
      submitScore({ user_id:user.id, display_name:dn, avatar:avx, format:rec.format, points:rec.points, prob:rec.prob, verdict:rec.verdictTitle });
    }
  }
  function bumpShares(){
    const before=stats||blankStats(); const beforeE=earnedBadges(before);
    const after=Object.assign({},before,{shares:(before.shares||0)+1}); setStats(after);
    try{ localStorage.setItem(STATS_KEY,JSON.stringify(after)); }catch(e){}
    const fresh=earnedBadges(after).find(id=>beforeE.indexOf(id)<0);
    if(fresh){ const b=BADGES.find(x=>x.id===fresh); setNewBadge(b); setTimeout(()=>setNewBadge(null),4200); }
    if(AUTH_ENABLED && user) upsertProfile(user.id,{display_name:(profile&&profile.display_name)||'',avatar:(profile&&profile.avatar)||'ball',stats:after});
  }
  function onNav(action){
    setDrawerOpen(false);
    if(action==='play'){ if(screen!=='landing'){ setRoster([]); setScreen('landing'); } }
    else if(action==='records') setRecordsOpen(true);
    else if(action==='profile') setProfileOpen(true);
    else if(action==='login') setAuthOpen(true);
    else if(action==='myteams') setHistOpen(true);
    else if(action==='howto') setHowto(true);
    else if(action==='kofi') setKofiOpen(true);
    else if(action==='logout') doSignOut();
  }
  function changeLang(l){ setLang(l); }

  let fmt=FORMATS[fmtId];
  if(fmtId==='11'){ const f=F11_FORMATIONS[f11Form]; fmt={...FORMATS['11'],caps:f.caps,slots:f.slots,formation:f11Form,label:'Fútbol 11 · '+f11Form}; }
  const reset=()=>{ setRoster([]); setScreen('landing'); };
  const prog={landing:0,game:Math.min(.95,roster.length/fmt.rounds),result:1}[screen]??0;
  const navAv = profile&&profile.avatar ? profile.avatar : null;
  return (
    <LangCtx.Provider value={lang}>
      <div className="app-bg" aria-hidden="true"></div>
      <ParticleCanvas/>
      <ProgressBar value={prog}/>
      <SoundBtn on={sound.on} toggle={sound.toggle}/>

      {screen!=='game' && (
        <button className="menu-toggle" onClick={()=>setDrawerOpen(true)} aria-label={T('nav.menu')}>
          {navAv
            ? <span className="menu-toggle__ava" style={avStyle(navAv)}>{avContent(navAv)}</span>
            : <span className="menu-toggle__bars"><span></span><span></span><span></span></span>}
          {user ? (profile&&profile.display_name?profile.display_name:(user.email?user.email.split('@')[0]:T('nav.profile'))) : T('nav.menu')}
        </button>
      )}

      <Drawer open={drawerOpen} onClose={()=>setDrawerOpen(false)} user={user} profile={profile} lang={lang} onSetLang={changeLang} onNav={onNav} onOpenLegal={(d)=>{ setDrawerOpen(false); setLegalDoc(d); }}/>

      {screen==='landing' && <Landing onStart={()=>{setRoster([]);setScreen('game');}} onHowto={()=>setHowto(true)} genius={genius} onToggleGenius={()=>setGenius(g=>!g)} fmtId={fmtId} onSetFmt={setFmtId} f11Form={f11Form} onSetF11Form={setF11Form}/>}
      {screen==='game' && <Game roster={roster} onAddPlayer={p=>setRoster(r=>[...r,p])} onFinish={()=>setScreen('result')} onHowto={()=>setHowto(true)} onReset={reset} play={sound.play} genius={genius} fmt={fmt}/>}
      {screen==='result' && <Result roster={roster} onReplay={reset} onHowto={()=>setHowto(true)} play={sound.play} genius={genius} fmt={fmt} user={user} onWantLogin={()=>setAuthOpen(true)} onComplete={handlePlay} onShared={bumpShares}/>}
      {howto && <ScoringModal onClose={()=>setHowto(false)}/>}

      <footer className="site-footer">
        <div>{T('footer.indep')}</div>
        <div style={{marginTop:8}}>
          <a onClick={()=>setLegalDoc('aviso')}>{T('footer.legal')}</a>
          <a onClick={()=>setLegalDoc('privacidad')}>{T('footer.privacy')}</a>
          <a onClick={()=>setLegalDoc('cookies')}>{T('footer.cookies')}</a>
          <a onClick={()=>setLegalDoc('terminos')}>{T('footer.terms')}</a>
          {KOFI_USERNAME && <a href={'https://ko-fi.com/'+KOFI_USERNAME} target="_blank" rel="noopener">{T('footer.support')}</a>}
        </div>
      </footer>

      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onAuthed={()=>setAuthOpen(false)} onOpenLegal={setLegalDoc}/>}
      {profileOpen && <ProfileModal user={user} profile={profile} stats={stats} onClose={()=>setProfileOpen(false)} onSave={saveProfile} onWantLogin={()=>{ setProfileOpen(false); setAuthOpen(true); }}/>}
      {recordsOpen && <RecordsModal user={user} profile={profile} onClose={()=>setRecordsOpen(false)} onWantLogin={()=>{ setRecordsOpen(false); setAuthOpen(true); }}/>}
      {histOpen && <HistoryModal onClose={()=>setHistOpen(false)} onDeleteData={doDeleteData}/>}
      {kofiOpen && <KofiModal onClose={()=>setKofiOpen(false)}/>}
      {legalDoc && <LegalModal docKey={legalDoc} onClose={()=>setLegalDoc(null)}/>}
      {consent===null && GA4_ID && <CookieBanner onAccept={()=>setConsentChoice(true)} onReject={()=>setConsentChoice(false)} onOpenCookies={()=>setLegalDoc('cookies')}/>}
      <BadgeToast badge={newBadge}/>
    </LangCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
