  <style>
:root{
  --void:#05070f; --deep:#0a0e1a; --surface:#141929; --elevated:#1e2740; --border:#1f2d4d;
  --gold:#f0c040; --gold-bright:#ffe06e; --gold-dim:#7a5e18; --gold-glow:rgba(240,192,64,.15);
  --pitch:#0d3320; --pitch-line:rgba(255,255,255,.14);
  --text:#f3f5fb; --muted:#a7b3d6; --subtle:#7b89ad;
  --gk:#f59e0b; --def:#3b82f6; --mid:#22c55e; --fwd:#ef4444;
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-xl:30px; --r-pill:9999px;
  --shadow-gold:0 0 20px rgba(240,192,64,.3),0 0 60px rgba(240,192,64,.1);
  --shadow-card:0 8px 32px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.04) inset;
  --ease:cubic-bezier(.22,1,.36,1);
}
[data-pos="GK"]{--pos:var(--gk);}[data-pos="DEF"]{--pos:var(--def);}
[data-pos="MID"]{--pos:var(--mid);}[data-pos="FWD"]{--pos:var(--fwd);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{background:var(--void);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
*{-webkit-tap-highlight-color:transparent;}
button,a,.btn,.fmt-chip,.mode-chip,.pick-card,.spin-btn,.icon-btn,.wildcard,.menu-toggle{touch-action:manipulation;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}
#root{min-height:100dvh;position:relative;z-index:1;}
h1,h2,h3{font-weight:400;line-height:.95;}
.label{font-family:'Rajdhani',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.15em;font-size:11px;color:var(--muted);}

/* FX */
.particle-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.85;}
.progressbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;pointer-events:none;}
.progressbar__fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold));box-shadow:0 0 10px var(--gold);transition:width .6s var(--ease);}

/* Buttons */
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:.1em;border:none;cursor:pointer;border-radius:var(--r-pill);display:inline-flex;align-items:center;justify-content:center;gap:.5em;transition:transform .12s var(--ease),background .2s,box-shadow .25s,color .2s;user-select:none;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn--gold{background:var(--gold);color:var(--void);font-size:19px;padding:15px 46px;}
.btn--gold:hover{background:var(--gold-bright);box-shadow:var(--shadow-gold);}
.btn--outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold-dim);font-size:16px;padding:12px 28px;}
.btn--outline:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);}
.btn--ghost{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.12em;padding:9px 16px;border-radius:var(--r-pill);cursor:pointer;}
.btn--ghost:hover{color:var(--text);border-color:var(--gold-dim);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-pill);border:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);background:rgba(10,14,26,.5);}
.badge__dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
.stars{display:inline-flex;gap:2px;color:var(--gold);}
.stars svg{width:1em;height:1em;display:block;}
.stars .off{color:var(--subtle);}

/* Screens — robustez: nada de overflow:hidden que recorte texto */
.screen{position:relative;z-index:1;min-height:100dvh;}
.screen-enter{animation:screenIn .4s var(--ease);}
@keyframes screenIn{from{transform:translateY(12px)}to{transform:translateY(0)}}
.stagger>*{animation:itemIn .5s var(--ease) backwards;}
/* entrada solo con desplazamiento: el texto NUNCA queda translúcido (no se apaga) */
@keyframes itemIn{from{transform:translateY(16px)}to{transform:translateY(0)}}

.disclaimer{text-align:center;padding:18px 20px 14px;font-size:10px;color:var(--subtle);max-width:760px;margin:0 auto;line-height:1.5;}

/* Pitch backdrop */
.pitch-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:grid;place-items:center;overflow:hidden;}
.pitch-bg__field{position:relative;width:min(760px,94vw);aspect-ratio:1.05/1;border:2px solid var(--pitch-line);background:radial-gradient(ellipse at center,rgba(255,255,255,.03),transparent 50%),linear-gradient(rgba(5,7,15,.4),rgba(5,7,15,.6)),var(--pitch);transform:perspective(1400px) rotateX(46deg) scale(1.12);border-radius:2px;opacity:.4;}
.pitch-bg__field::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:var(--pitch-line);}
.pitch-bg__field::after{content:'';position:absolute;left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border:2px solid var(--pitch-line);border-radius:50%;}
.pitch-bg__vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(5,7,15,.8) 92%);}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:60px 20px 30px;min-height:100dvh;}
.landing__inner{display:flex;flex-direction:column;align-items:center;gap:22px;max-width:480px;}
.wordmark{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,128px);letter-spacing:-.01em;line-height:.82;color:var(--text);text-shadow:0 0 60px rgba(240,192,64,.12);}
.wordmark__rule{width:64px;height:2px;background:var(--gold);margin:14px auto 0;box-shadow:0 0 12px var(--gold);}
.tagline{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4.4vw,46px);letter-spacing:.09em;color:var(--gold);}
.lede{font-size:15px;line-height:1.65;color:var(--muted);max-width:380px;}
.landing__actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;}
.landing__stats{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle);font-variant-numeric:tabular-nums;}
.steps3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:480px;margin-top:2px;}
.step3{display:flex;flex-direction:column;gap:6px;padding:14px 14px 16px;border:1px solid var(--border);border-radius:var(--r-lg);background:rgba(255,255,255,.02);text-align:left;}
.step3__n{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--gold);}
.step3__t{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.02em;color:var(--text);}
.step3__d{font-size:12px;line-height:1.4;color:var(--muted);}
@media(max-width:560px){.steps3{grid-template-columns:1fr;gap:8px;}.step3{flex-direction:row;align-items:center;gap:12px;padding:10px 12px;}.step3__n{font-size:20px;min-width:22px;}}

/* MODAL — explicación puntuación */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(3,5,11,.78);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{position:relative;width:min(640px,100%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:26px 26px 30px;margin:auto;animation:itemIn .35s var(--ease);}
.modal__close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-size:18px;line-height:1;display:grid;place-items:center;}
.modal__close:hover{color:var(--text);border-color:var(--gold-dim);}
.modal__kicker{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:11px;color:var(--gold);}
.modal__title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.01em;margin:4px 0 14px;}
.modal h4{font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:13px;color:var(--text);margin:18px 0 7px;display:flex;align-items:center;gap:8px;}
.modal h4 .dotc{width:8px;height:8px;border-radius:50%;}
.modal p{font-size:13.5px;line-height:1.6;color:var(--muted);margin-bottom:6px;}
.modal p b{color:var(--text);font-weight:600;}
.modal__factors{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 4px;}
.factor{background:var(--deep);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;}
.factor__name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text);}
.factor__desc{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:3px;}

/* GAME */
.game{display:grid;grid-template-rows:auto 1fr;min-height:100dvh;}
.game__topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px 10px;border-bottom:1px solid var(--border);background:rgba(5,7,15,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30;}
.game__topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.round-counter{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;}
.round-counter span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;}
.icon-btn:hover{color:var(--gold);border-color:var(--gold-dim);}
.slots-summary{display:flex;gap:6px;flex-wrap:wrap;}
.slot-pill{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-pill);border:1px solid var(--border);color:var(--subtle);}
.slot-pill.needs{color:var(--pos);border-color:var(--pos);}
.slot-pill.done{color:var(--mid);border-color:var(--mid);opacity:.7;}

.game__body{display:grid;grid-template-columns:minmax(340px,460px) minmax(420px,1fr);align-items:stretch;min-height:0;max-width:1180px;margin:0 auto;width:100%;}
.game__pitch-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 24px;border-right:1px solid var(--border);background:rgba(5,7,15,.3);gap:6px;}
.game__pitch-title{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--subtle);margin-bottom:10px;}
.pitch-context{display:none;}
.live-pitch{position:relative;width:100%;max-width:384px;aspect-ratio:2/3;border-radius:var(--r-lg);overflow:hidden;background:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,.04),transparent 65%),repeating-linear-gradient(118deg,transparent 0 26px,rgba(255,255,255,.015) 26px 52px),var(--pitch);border:1px solid rgba(255,255,255,.08);}
.live-pitch__lines{position:absolute;inset:12px;border:1.5px solid var(--pitch-line);border-radius:3px;}
.live-pitch__halfway{position:absolute;left:12px;right:12px;top:50%;height:1.5px;background:var(--pitch-line);}
.live-pitch__circle{position:absolute;left:50%;top:50%;width:22%;aspect-ratio:1;transform:translate(-50%,-50%);border:1.5px solid var(--pitch-line);border-radius:50%;}
.live-pitch__box{position:absolute;left:50%;transform:translateX(-50%);width:46%;height:14%;border:1.5px solid var(--pitch-line);}
.live-pitch__box--top{top:0;border-top:none;}.live-pitch__box--bot{bottom:0;border-bottom:none;}
.pnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
.pnode.filled{animation:nodeIn .5s var(--ease);}
@keyframes nodeIn{from{transform:translate(-50%,-50%) scale(.4);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.pnode__disc{width:42px;height:42px;border-radius:50%;background:rgba(10,14,26,.95);border:2px solid var(--pos);box-shadow:0 0 14px -3px var(--pos);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--pos);}
.pnode.empty .pnode__disc{border-style:dashed;border-color:rgba(58,74,106,.6);box-shadow:none;opacity:.5;color:var(--subtle);}
.pnode__name{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.02em;color:var(--text);text-shadow:0 1px 4px #000;text-align:center;line-height:1;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pnode.empty .pnode__name{color:var(--subtle);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}

.game__panel-col{display:flex;flex-direction:column;background:var(--deep);min-height:0;}
.spin-panel{display:flex;flex-direction:column;flex:1;min-height:0;}

.idle-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:36px 24px;text-align:center;}
.spin-btn{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(240,192,64,.12),transparent 60%),var(--surface);border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .3s var(--ease);animation:breathe 2.4s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(1);border-color:var(--border)}50%{transform:scale(1.04);border-color:var(--gold-dim)}}
.spin-btn:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);transform:scale(1.06);animation:none;}
.spin-btn__icon{font-size:46px;line-height:1;}
.spin-btn__label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;}
.idle-hint{font-size:13px;color:var(--muted);max-width:220px;line-height:1.5;}

.spinning-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 24px;}
.spin-card{width:250px;border-radius:var(--r-xl);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-card);padding:24px 22px;display:flex;flex-direction:column;gap:6px;}
.spin-card.is-spinning{animation:flip 1.05s var(--ease);}
@keyframes flip{0%{transform:perspective(1100px) rotateY(0)}45%{transform:perspective(1100px) rotateY(90deg);filter:blur(2px)}55%{transform:perspective(1100px) rotateY(90deg);filter:blur(2px)}100%{transform:perspective(1100px) rotateY(0)}}
.spin-card__decade{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);}
.spin-card__era{font-size:11px;color:var(--subtle);}
.spin-card__team{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:.9;margin-top:6px;}
.spin-card__count{color:var(--muted);font-size:12px;margin-top:4px;}

.revealed-stage{display:flex;flex-direction:column;flex:1;min-height:0;}
.revealed-header{padding:15px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;background:var(--deep);}
.revealed-team{font-family:'Bebas Neue',sans-serif;font-size:27px;}
.revealed-era{font-size:12px;color:var(--muted);margin-top:2px;}
.pick-instruction{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);}
.pick-instruction::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
.players-list{flex:1;overflow-y:auto;padding:12px 16px 16px;display:flex;flex-direction:column;gap:7px;}
.players-list::-webkit-scrollbar{width:5px;}
.players-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.pos-group-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:6px 0 3px;color:var(--pos);}
.pick-card{width:100%;display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--pos);cursor:pointer;text-align:left;transition:transform .15s var(--ease),background .18s,box-shadow .2s,border-color .18s;}
.pick-card:hover:not(.disabled){background:var(--elevated);transform:translateX(4px);border-color:var(--pos);}
.pick-card.selected{border:2px solid var(--pos);border-left-width:3px;background:color-mix(in oklab,var(--pos) 12%,var(--surface));box-shadow:0 0 0 1px var(--pos),0 0 20px -4px var(--pos);transform:translateX(4px);}
.pick-card.picked-other{opacity:.5;}
.pick-card.disabled{opacity:.3;cursor:not-allowed;}
.picked-change{margin-left:auto;align-self:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-pill);padding:7px 12px;cursor:pointer;transition:all .2s;}
.picked-change:hover{color:var(--text);border-color:var(--fwd);}
.pick-card__pos{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;color:var(--pos);width:26px;flex-shrink:0;}
.pick-card__info{flex:1;min-width:0;}
.pick-card__name{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1;letter-spacing:.01em;}
.pick-card__sub{font-size:11px;color:var(--muted);margin-top:3px;}
.pick-card__right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.pick-card__stars{font-size:10px;}
.pick-card__ovr{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--gold);line-height:1;}
.pick-card__ovrlbl{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:8px;letter-spacing:.1em;color:var(--subtle);text-transform:uppercase;}
.pick-card__check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:grid;place-items:center;color:var(--gold);flex-shrink:0;transition:all .2s;}
.pick-card.selected .pick-card__check{border-color:var(--gold);background:var(--gold);color:var(--void);}
.no-picks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px 24px;text-align:center;color:var(--muted);font-size:14px;}
.no-picks__icon{font-size:32px;opacity:.5;}
.picked-footer{padding:14px 18px;border-top:1px solid var(--border);background:var(--deep);display:flex;flex-direction:column;gap:10px;position:sticky;bottom:0;z-index:5;}
.picked-confirm{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:var(--r-md);background:color-mix(in oklab,var(--mid) 8%,var(--surface));border:1px solid var(--mid);}
.picked-confirm__icon{color:var(--mid);font-size:18px;}
.picked-confirm__label{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);}
.picked-confirm__name{font-family:'Bebas Neue',sans-serif;font-size:21px;}
.picked-confirm__pos{font-size:11px;color:var(--muted);}
.finish-banner{padding:16px 20px;border-top:1px solid var(--gold-dim);background:rgba(240,192,64,.05);display:flex;flex-direction:column;align-items:center;gap:10px;}
.finish-banner__text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}

/* RESULT */
.result{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:50px 20px 20px;min-height:100dvh;}
.verdict{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:600px;}
.verdict__kicker{display:flex;align-items:center;gap:12px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.3em;font-size:12px;color:var(--gold);}
.verdict__kicker::before,.verdict__kicker::after{content:'✦';}
.verdict__title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,78px);line-height:.86;letter-spacing:.01em;color:#f7f9ff;text-shadow:0 2px 22px rgba(0,0,0,.9);}
.is-champ .verdict__title{color:var(--gold);text-shadow:0 0 50px rgba(240,192,64,.6),0 0 120px rgba(240,192,64,.3);}
.verdict__tag{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:13px;color:var(--gold);}
.verdict__sub{color:var(--muted);font-size:14px;line-height:1.5;max-width:460px;}

/* big stat row */
.bigstats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.bigstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 18px;min-width:96px;}
.bigstat__num{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--text);}
.bigstat.gold .bigstat__num{color:var(--gold);}
.bigstat__lbl{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* attribute bars */
.attrs{width:100%;max-width:460px;display:flex;flex-direction:column;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
.attrs__title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--subtle);margin-bottom:2px;text-align:left;}
.attr{display:grid;grid-template-columns:96px 1fr 38px;align-items:center;gap:10px;}
.attr__name{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.04em;color:var(--muted);text-align:left;text-transform:uppercase;}
.attr__track{height:8px;border-radius:var(--r-pill);background:var(--deep);overflow:hidden;}
.attr__fill{height:100%;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1s var(--ease);}
.attr__val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--text);text-align:right;}

.result__xi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:520px;}
.mini-card{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--pos);border-radius:var(--r-sm);padding:9px 6px;text-align:center;}
.mini-card__pos{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;letter-spacing:.08em;color:var(--pos);}
.mini-card__name{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;margin:4px 0;}
.mini-card__ovr{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:var(--gold);}
.result__actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:250;overflow:hidden;}
.confetti i{position:absolute;top:-16px;width:7px;height:12px;border-radius:1px;background:var(--gold);opacity:.9;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0}}

@media(min-width:821px){
  /* En escritorio el juego cabe en la pantalla: el campo queda fijo a la
     izquierda y la lista de jugadores hace su propio scroll a la derecha. */
  .game{height:100dvh;}
}
@media(max-width:820px){
  /* --p = progreso de scroll 0..1 (lo fija el JS por frame). El campo encoge
     de forma CONTINUA ligada al dedo; sin transiciones que peleen con el scroll. */
  .game__body{grid-template-columns:1fr;grid-template-rows:auto auto;}
  .game__pitch-col{position:sticky;top:var(--topbar-h,52px);z-index:20;border-right:none;border-bottom:1px solid var(--border);
    padding:calc(6px + (1 - var(--p,0))*8px) 16px calc(6px + (1 - var(--p,0))*6px);
    flex-direction:column;justify-content:flex-start;gap:6px;background:var(--deep);
    box-shadow:0 8px 22px -12px rgba(0,0,0,calc(.7*var(--p,0)));}
  .game__pitch-title{display:block;margin:0;line-height:1.1;overflow:hidden;
    opacity:clamp(0, calc(1 - var(--p,0)*1.8), 1);
    max-height:calc((1 - var(--p,0)) * 22px);}
  .live-pitch{width:calc(34vw + (1 - var(--p,0))*38vw);max-width:calc(126px + (1 - var(--p,0))*174px);
    height:auto;aspect-ratio:2/3;flex-shrink:0;transform-origin:top center;will-change:width;}
  .pnode__disc{width:calc(23px + (1 - var(--p,0))*15px);height:calc(23px + (1 - var(--p,0))*15px);
    font-size:calc(9px + (1 - var(--p,0))*3px);}
  .pnode__name{font-size:9px;max-width:58px;opacity:clamp(0, calc(1 - var(--p,0)*2), 1);}
  /* Contexto del equipo + época anclado en el campo sticky: aparece al encoger
     (cross-fade con la cabecera de la lista, que se va con el scroll). */
  .pitch-context{display:flex;flex-direction:column;align-items:center;gap:1px;text-align:center;
    opacity:clamp(0, calc(var(--p,0)*2.4 - 0.7), 1);
    max-height:calc(clamp(0, calc(var(--p,0)*1.8), 1) * 42px);overflow:hidden;pointer-events:none;}
  .pitch-context__team{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;letter-spacing:.01em;color:var(--text);}
  .pitch-context__era{font-size:10px;color:var(--muted);line-height:1.1;}
  .revealed-header{position:static;}
  /* La identidad en la cabecera de la lista se desvanece y colapsa al encoger,
     para que el nombre del equipo solo se vea en UN sitio (cross-fade real). */
  .revealed-team{opacity:clamp(0, calc(1.15 - var(--p,0)*2.4), 1);
    max-height:calc((1 - clamp(0, calc(var(--p,0)*1.8), 1)) * 34px);overflow:hidden;}
  .revealed-era{opacity:clamp(0, calc(1.15 - var(--p,0)*2.4), 1);
    max-height:calc((1 - clamp(0, calc(var(--p,0)*1.8), 1)) * 20px);overflow:hidden;}
  .slots-summary{order:3;}
  .result__xi{grid-template-columns:repeat(2,1fr);}
  .modal__factors{grid-template-columns:1fr;}
  .spin-reel__team{font-size:28px;}
}
@media(max-width:820px) and (prefers-reduced-motion:reduce){
  /* misma intención, recorrido más suave (menos diferencia de tamaño) */
  .live-pitch{width:calc(46vw + (1 - var(--p,0))*26vw);max-width:calc(170px + (1 - var(--p,0))*130px);}
  .pnode__disc{width:calc(28px + (1 - var(--p,0))*10px);height:calc(28px + (1 - var(--p,0))*10px);}
}

/* ===== Fondo atractivo (sin oscurecer el contenido) ===== */
.app-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1100px 620px at 50% -8%, rgba(240,192,64,.13), transparent 62%),
    radial-gradient(820px 520px at 10% 106%, rgba(60,90,170,.13), transparent 60%),
    radial-gradient(820px 520px at 92% 102%, rgba(120,60,160,.09), transparent 60%);
}
.app-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(3,5,11,.5) 100%);}

/* Legibilidad reforzada */
.pick-card__name{color:#f5f7fd;}
.mini-card__name{color:#f5f7fd;}
.revealed-team{color:#f7f9ff;}
.spin-card__team{color:#f7f9ff;}

/* Selector de formato */
.fmt-select{display:inline-flex;gap:6px;background:rgba(10,14,26,.55);border:1px solid var(--border);border-radius:var(--r-pill);padding:5px;}
.fmt-chip{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;border-radius:var(--r-pill);padding:8px 16px;cursor:pointer;transition:all .2s;}
.fmt-chip.on{background:var(--gold);color:var(--void);}
.fmt-chip:not(.on):hover{color:var(--text);}
.fmt-row{display:flex;flex-direction:column;align-items:center;gap:7px;}
.fmt-row__label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

/* SpinReel — tragaperras */
.spin-reel{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;padding:30px 28px;border-radius:var(--r-xl);background:var(--surface);border:1px solid var(--gold-dim);box-shadow:var(--shadow-card),0 0 50px -10px var(--gold-glow);min-width:250px;overflow:hidden;animation:reelShake .45s ease-in-out infinite;}
@keyframes reelShake{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-3px) rotate(.5deg)}}
.spin-reel__dice{font-size:42px;line-height:1;animation:diceSpin .5s linear infinite;}
@keyframes diceSpin{to{transform:rotate(360deg)}}
.spin-reel__decade{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);opacity:.85;}
.spin-reel__team{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:#fff;text-align:center;min-height:40px;filter:blur(.3px);}
.spin-reel__hint{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
.spin-reel__glow{position:absolute;inset:-50%;background:conic-gradient(from 0deg,transparent,var(--gold-glow),transparent 38%);animation:diceSpin 1.3s linear infinite;pointer-events:none;}

/* Comodines */
.wildcards{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.wildcard{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);background:rgba(240,192,64,.08);border:1px solid var(--gold-dim);border-radius:var(--r-pill);padding:7px 13px;cursor:pointer;transition:all .2s;}
.wildcard:hover:not(:disabled){background:rgba(240,192,64,.16);border-color:var(--gold);}
.wildcard:disabled{opacity:.32;cursor:not-allowed;text-decoration:line-through;}

/* Compartir */
.share-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;max-width:560px;}
.share-btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;color:var(--sc,var(--muted));background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-pill);padding:9px 16px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;}
.share-btn:hover{border-color:var(--sc,var(--gold-dim));box-shadow:0 0 16px -6px var(--sc,var(--gold));color:var(--sc,var(--text));}

/* Selector de MODO (competición) */
.mode-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;}
.mode-chip{position:relative;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:9px 16px;border-radius:var(--r-pill);border:1px solid var(--border);background:rgba(10,14,26,.5);color:var(--muted);cursor:pointer;transition:all .2s;line-height:1.1;}
.mode-chip.on{background:var(--gold);color:var(--void);border-color:var(--gold);}
.mode-chip.soon{opacity:.6;cursor:not-allowed;}
.mode-chip.soon span{display:block;font-size:8px;letter-spacing:.14em;color:var(--gold);opacity:.8;margin-top:2px;}
.mode-chip.soon:hover{opacity:.8;border-color:var(--gold-dim);}

/* Revelación grande EQUIPO + DÉCADA */
.reveal-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;padding:34px 42px;border-radius:var(--r-xl);background:linear-gradient(180deg,var(--elevated),var(--surface));border:1px solid var(--gold-dim);box-shadow:var(--shadow-card),0 0 60px -12px var(--gold-glow);text-align:center;animation:revealPop .4s var(--ease);}
@keyframes revealPop{0%{transform:scale(.82);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.reveal-card__block{display:flex;flex-direction:column;gap:3px;}
.reveal-card__label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);}
.reveal-card__team{font-family:'Bebas Neue',sans-serif;font-size:clamp(34px,6vw,54px);line-height:.95;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.6);}
.reveal-card__decade{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4.5vw,38px);line-height:1;color:var(--gold-bright);}
.reveal-card__sep{width:66px;height:2px;background:var(--gold-dim);margin:2px 0;}
.reveal-card__era{font-size:13px;color:var(--muted);margin-top:6px;max-width:280px;}

/* ===== AUTH / CUENTA / LEGAL / COOKIES (anadido) ===== */
.acct-btn{position:fixed;top:12px;left:14px;z-index:210;display:inline-flex;align-items:center;gap:7px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:rgba(10,14,26,.6);border:1px solid var(--border);border-radius:var(--r-pill);padding:8px 14px;cursor:pointer;backdrop-filter:blur(6px);max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-btn:hover{color:var(--text);border-color:var(--gold-dim);}
.acct-btn__dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);flex:none;}
.acct-menu{position:fixed;top:50px;left:14px;z-index:215;background:var(--elevated);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-card);min-width:210px;overflow:hidden;animation:itemIn .25s var(--ease);}
.acct-menu__email{padding:12px 14px;font-size:11.5px;color:var(--subtle);border-bottom:1px solid var(--border);word-break:break-all;}
.acct-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;padding:11px 14px;cursor:pointer;}
.acct-menu button:hover{background:rgba(255,255,255,.04);color:var(--text);}
.acct-menu button.danger:hover{color:var(--fwd);}
.field{margin:12px 0;}
.field label{display:block;font-family:'Rajdhani',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;background:var(--deep);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:15px;padding:12px 14px;font-family:'Inter',sans-serif;}
.field input:focus{outline:none;border-color:var(--gold-dim);box-shadow:0 0 0 3px var(--gold-glow);}
.checkrow{display:flex;align-items:flex-start;gap:9px;margin:10px 0;}
.checkrow input{margin-top:2px;width:16px;height:16px;accent-color:var(--gold);flex:none;}
.checkrow label{margin:0;text-transform:none;letter-spacing:0;font-size:12.5px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:400;line-height:1.45;}
.checkrow a{color:var(--gold);text-decoration:underline;cursor:pointer;}
.auth-tabs{display:flex;gap:6px;margin-bottom:6px;}
.auth-tabs button{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;padding:10px;border-radius:var(--r-sm);cursor:pointer;}
.auth-tabs button.active{background:var(--gold);color:var(--void);border-color:var(--gold);}
.auth-msg{font-size:12.5px;padding:9px 12px;border-radius:var(--r-sm);margin-top:6px;line-height:1.4;}
.auth-msg.err{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.auth-msg.ok{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.legal-body{max-height:62vh;overflow-y:auto;padding-right:8px;}
.legal-body h4{margin-top:16px;}
.legal-body p,.legal-body li{font-size:13px;line-height:1.6;color:var(--muted);}
.legal-body ul{margin:4px 0 4px 18px;}
.hist-empty{text-align:center;color:var(--subtle);font-size:13.5px;padding:24px 0;line-height:1.6;}
.hist-list{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding-right:6px;}
.hist-item{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--deep);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;}
.hist-item__main{min-width:0;}
.hist-item__title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:.02em;}
.hist-item__meta{font-size:11.5px;color:var(--subtle);margin-top:2px;overflow:hidden;text-overflow:ellipsis;}
.hist-item__del{background:none;border:none;color:var(--subtle);cursor:pointer;font-size:16px;flex:none;}
.hist-item__del:hover{color:var(--fwd);}
.cookie-banner{position:fixed;left:0;right:0;bottom:0;z-index:500;background:var(--elevated);border-top:1px solid var(--border);box-shadow:0 -8px 32px rgba(0,0,0,.5);padding:16px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:14px;justify-content:center;animation:itemIn .4s var(--ease);}
.cookie-banner p{font-size:12.5px;color:var(--muted);line-height:1.5;max-width:560px;margin:0;}

  function lineMean(players) {

    var base = roster.length ? lineMean(roster) : 50;

      0.16 * control +

    overall += (balance - 0.5) * 8;    // +/-4 por equilibrio

      avgPoints: totPoints / sims,
      avgWins: totWins / sims,
      avgDraws: totDraws / sims,
      avgLosses: totLoss / sims,
      avgGF: totGF / sims,
      avgGA: totGA / sims,
      unbeatenProb: unbeatenSeasons / sims,
      bestPoints: bestPts,

/* --- Consentimiento de cookies --- */
const CONSENT_KEY = 'invictos_consent_v1';
function applyConsent(granted){
  if (!window.gtag) return;
  const v = granted ? 'granted' : 'denied';
  gtag('consent', 'update', { ad_storage:v, ad_user_data:v, ad_personalization:v, analytics_storage:v });
}
(function(){ try{ if (localStorage.getItem(CONSENT_KEY) === 'granted') applyConsent(true); }catch(e){} })();

/* --- Auth + datos (Supabase) --- */
async function authSignUp(email, password){ return sb.auth.signUp({ email: email, password: password }); }
async function authSignIn(email, password){ return sb.auth.signInWithPassword({ email: email, password: password }); }
async function authSignOut(){ return sb.auth.signOut(); }
async function saveTeam(rec){ if(!sb) return { error: 'no-auth' }; return sb.from('teams').insert(rec); }
async function fetchTeams(){ if(!sb) return { data: [] }; return sb.from('teams').select('*').order('created_at', { ascending: false }); }
async function deleteTeam(id){ if(!sb) return; return sb.from('teams').delete().eq('id', id); }
async function deleteAccountData(){ if(!sb) return; return sb.from('teams').delete().neq('id', '00000000-0000-0000-0000-000000000000'); }

/* === Perfil, avatares, ranking (Supabase) — con fallback local === */
async function getProfile(uid){ if(!sb) return null; try{ const r=await sb.from('profiles').select('*').eq('id',uid).maybeSingle(); return r.data||null; }catch(e){ return null; } }
async function upsertProfile(uid, patch){ if(!sb) return {error:'no-auth'}; try{ return await sb.from('profiles').upsert(Object.assign({id:uid, updated_at:new Date().toISOString()}, patch)); }catch(e){ return {error:e}; } }
async function uploadAvatar(uid, file){
  if(!sb) return {error:'no-auth'};
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=uid+'/'+Date.now()+'.'+ext;
    const up=await sb.storage.from('avatars').upload(path,file,{upsert:true,contentType:file.type});
    if(up.error) return {error:up.error};
    const pub=sb.storage.from('avatars').getPublicUrl(path);
    return {url:pub.data.publicUrl};
  }catch(e){ return {error:e}; }
}
async function submitScore(rec){ if(!sb) return {error:'no-auth'}; try{ return await sb.from('scores').insert(rec); }catch(e){ return {error:e}; } }
async function fetchLeaderboard(limit){ if(!sb) return {data:null,error:'no-auth'}; try{ return await sb.from('scores').select('display_name,avatar,points,prob,verdict,format,created_at,user_id').order('points',{ascending:false}).limit(limit||50); }catch(e){ return {data:null,error:e}; } }

/* === i18n: ES / EN / PT / FR con autodetección por región === */
const SUPPORTED_LANGS = ['es','en','pt','fr'];
const LANG_LABELS = { es:'Español', en:'English', pt:'Português', fr:'Français' };
const LANG_FLAGS  = { es:'🇪🇸', en:'🇬🇧', pt:'🇧🇷', fr:'🇫🇷' };
function detectLang(){
  try{
    const qp=new URLSearchParams(location.search).get('lang');
    if(qp && SUPPORTED_LANGS.indexOf(qp)>=0) return qp;
    const saved=localStorage.getItem('invictos_lang');
    if(saved && SUPPORTED_LANGS.indexOf(saved)>=0) return saved;
    const navs=(navigator.languages&&navigator.languages.length)?navigator.languages:[navigator.language||'en'];
    for(const l of navs){ const code=(l||'').slice(0,2).toLowerCase(); if(SUPPORTED_LANGS.indexOf(code)>=0) return code; }
  }catch(e){}
  return 'en';
}

function tr(k, lang, v){ const o=TR[k]; let s=o?(o[lang]||o.es||k):k; if(v){ for(const p in v){ s=s.split('{'+p+'}').join(v[p]); } } return s; }
const LangCtx = React.createContext('es');
function useT(){ const lang=React.useContext(LangCtx); return React.useCallback((k,v)=>tr(k,lang,v),[lang]); }
function useLang(){ return React.useContext(LangCtx); }

/* === Moderación de nombres (multilingüe) === */
const BANNED = ['puta','puto','mierda','cabron','cabrón','gilipollas','polla','coño','joder','maricon','maricón','zorra','subnormal','retrasado','negro de','fuck','shit','bitch','asshole','cunt','nigger','faggot','whore','dick','pussy','merda','caralho','foda','puta','viado','cu','con','salope','pute','merde','enculé','pd','negre','bastard','hitler','nazi','isis','rape','violar','kill yourself','kys'];
function isCleanName(name){
  const n=(name||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,'');
  if(!n) return true;
  for(const w of BANNED){ const ww=w.normalize('NFD').replace(/[̀-ͯ]/g,''); if(n.indexOf(ww)>=0) return false; }
  if(/(.)\1{5,}/.test(n)) return false; // spam de un carácter
  return true;
}

/* === Motor de estadísticas + insignias === */
const STATS_KEY='invictos_stats_v1', PROFILE_KEY='invictos_profile_v1';
function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadStats(){ try{ return JSON.parse(localStorage.getItem(STATS_KEY))||null; }catch(e){ return null; } }
function blankStats(){ return { teams:0, bestPoints:0, bestProb:0, days:[], streak:0, longest:0, formats:[], verdicts:[], invicto:false, champion:false, genius:0, shares:0, lastDay:null }; }
function computeStreak(days){
  if(!days||!days.length) return {streak:0,longest:0};
  const s=Array.from(new Set(days)).sort();
  let longest=1,cur=1;
  for(let i=1;i<s.length;i++){ const prev=new Date(s[i-1]), d=new Date(s[i]); const diff=Math.round((d-prev)/86400000); if(diff===1){cur++;} else if(diff>1){cur=1;} longest=Math.max(longest,cur); }
  // racha vigente: cuenta hasta hoy/ayer
  const last=s[s.length-1]; const today=todayStr(); const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  let streak=0;
  if(last===today||last===yest){ streak=1; for(let i=s.length-2;i>=0;i--){ const diff=Math.round((new Date(s[i+1])-new Date(s[i]))/86400000); if(diff===1) streak++; else break; } }
  return {streak,longest};
}
function recordPlay(stats, rec){
  const st = stats?Object.assign({},stats):blankStats();
  st.days = Array.from(new Set((st.days||[]).concat([todayStr()])));
  st.teams = (st.teams||0)+1;
  st.bestPoints = Math.max(st.bestPoints||0, rec.points||0);
  st.bestProb = Math.max(st.bestProb||0, rec.prob||0);
  if(rec.format && st.formats.indexOf(rec.format)<0) st.formats.push(rec.format);
  if(rec.verdictKey && st.verdicts.indexOf(rec.verdictKey)<0) st.verdicts.push(rec.verdictKey);
  if(rec.verdictKey==='invicto') st.invicto=true;
  if(rec.verdictKey==='campeon'||rec.verdictKey==='invicto') st.champion=true;
  if(rec.genius) st.genius=(st.genius||0)+1;
  const sk=computeStreak(st.days); st.streak=sk.streak; st.longest=sk.longest;
  st.lastDay=todayStr();
  return st;
}

function verdictFor(sim) {

  if (u >= 0.015 || p >= 100)
    return { key:'invicto', title:'CANDIDATO AL 38-0', tag:'La temporada perfecta al alcance',
      sub:'Este XI tiene opciones reales de no perder un solo partido. Leyenda inmortal.', tier:6 };

      sub:'Un equipo dominante. Levantaría el título con autoridad.', tier:5 };
  if (p >= 78) return { key:'champions', title:'PLAZA DE CHAMPIONS', tag:'Top 4 · Liga de Campeones',
      sub:'Un equipazo que pelea Europa todos los años.', tier:4 };
  if (p >= 64) return { key:'europa', title:'CLASIFICADO A EUROPA', tag:'Zona europea',
      sub:'Buen equipo, competitivo, con noches grandes.', tier:3 };
  if (p >= 50) return { key:'media', title:'MITAD DE TABLA', tag:'Temporada tranquila',

  return { key:'descenso', title:'DESCENSO', tag:'Segunda División te espera',

}

function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(()=>{
    const canvas = ref.current; if(!canvas) return;
    const ctx = canvas.getContext('2d'); let raf,w,h,dpr,pts=[];
    const isMobile = window.matchMedia('(max-width:640px)').matches;
    const count = isMobile?42:120;
    function resize(){dpr=Math.min(window.devicePixelRatio||1,2);w=canvas.width=innerWidth*dpr;h=canvas.height=innerHeight*dpr;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';}
    function seed(){pts=Array.from({length:count}).map(()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.1*dpr,vy:(Math.random()-.5)*.1*dpr,r:(Math.random()*1.2+.4)*dpr,gold:Math.random()<.12}));}
    resize();seed();const maxD=120*dpr;
    function tick(){ctx.clearRect(0,0,w,h);for(let i=0;i<pts.length;i++){const p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.gold?'rgba(240,192,64,.5)':'rgba(160,180,220,.3)';ctx.fill();for(let j=i+1;j<pts.length;j++){const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d2=dx*dx+dy*dy;if(d2<maxD*maxD){const a=(1-Math.sqrt(d2)/maxD)*.05;ctx.strokeStyle=(p.gold||q.gold)?`rgba(240,192,64,${a*1.4})`:`rgba(120,150,210,${a})`;ctx.lineWidth=dpr*.6;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}}}raf=requestAnimationFrame(tick);}
    tick();const onR=()=>{resize();seed();};addEventListener('resize',onR);
    return ()=>{cancelAnimationFrame(raf);removeEventListener('resize',onR);};
  },[]);
  return <canvas ref={ref} className="particle-canvas"/>;
}

    const RANGE=72;
    let raf=0, lastP=-1;
    const apply=()=>{ raf=0; let p=getY()/RANGE; if(p<0)p=0; else if(p>1)p=1;
      if(Math.abs(p-lastP)>0.004){ lastP=p; if(root)root.style.setProperty('--p',p.toFixed(3)); } };
    const onScroll=()=>{ if(!raf) raf=requestAnimationFrame(apply); };
    setVar(); apply();
    // capture:true → recoge el scroll venga del window, del <html> o del <body>
    // (body es el contenedor scrollable en móvil por overflow-x:hidden).
    window.addEventListener('scroll',onScroll,{passive:true,capture:true});
    window.addEventListener('resize',setVar);
    return ()=>{ window.removeEventListener('scroll',onScroll,{capture:true}); window.removeEventListener('resize',setVar); if(raf)cancelAnimationFrame(raf); };
  },[]);

  const round = roster.length + 1;
  const isDone = roster.length >= TOTAL_ROUNDS;
  const filled = { GK:0, DEF:0, MID:0, FWD:0 };
  roster.forEach(p=>filled[p.pos]++);
  const usedNames = new Set(roster.map(r=>r.name));
  const canPick = (p)=> filled[p.pos] < CAPS[p.pos] && !usedNames.has(p.name);

  function doSpin(){
    const usedTeams = new Set(history);
    let pool = TEAM_NAMES.filter(t=>!usedTeams.has(t));
    if(!pool.length){ setHistory([]); pool = TEAM_NAMES.slice(); }
    const team = pool[Math.floor(Math.random()*pool.length)];
    const opts = SPINS_BY_TEAM[team];
    const spin = opts[Math.floor(Math.random()*opts.length)];
    play('whoosh');
    setSpin(spin); setPhase('spinning');
    setTimeout(()=>{ play('reveal'); setPhase('reveal');
      setTimeout(()=>{ setPhase('revealed'); }, 900);
    }, 1100);
  }
  function pickPlayer(p){
    if(currentPick){
      if(currentPick.id===p.id){ setPick(null); setPhase('revealed'); return; } // deseleccionar
      if(!canPick(p)) return;
      setPick(p); play('select'); return;                                        // cambiar a otro
    }
    if(!canPick(p)) return;
    setPick(p); setPhase('picked'); play('select');
  }
  function deselect(){ setPick(null); setPhase('revealed'); }
  function nextRound(){ onAddPlayer(currentPick); setHistory(h=>[...h,currentSpin.team]); setSpin(null); setPick(null); setPhase('idle'); }
  function skipSpin(){ setHistory(h=>[...h,currentSpin.team]); setSpin(null); setPick(null); setPhase('idle'); }
  // COMODINES (uno de cada por partida)
  function wildTeam(){
    if(usedTeamWild) return;
    const used = new Set(history.concat(currentSpin?[currentSpin.team]:[]));
    let pool = TEAM_NAMES.filter(t=>!used.has(t));
    if(!pool.length) pool = TEAM_NAMES.filter(t=>!currentSpin||t!==currentSpin.team);
    const team = pool[Math.floor(Math.random()*pool.length)];
    const opts = SPINS_BY_TEAM[team];
    setUsedTeamWild(true); setPick(null);
    setSpin(opts[Math.floor(Math.random()*opts.length)]);
    play('select');
  }
  function wildDecade(){
    if(usedDecadeWild || !currentSpin) return;
    const opts = SPINS_BY_TEAM[currentSpin.team].filter(s=>s.id!==currentSpin.id);
    if(!opts.length) return;
    setUsedDecadeWild(true); setPick(null);
    setSpin(opts[Math.floor(Math.random()*opts.length)]);
    play('select');
  }

  const anyPickable = currentSpin && currentSpin.players.some(canPick);
  const slotPills = Object.entries(CAPS).map(([pos,cap])=>({pos,cap,have:filled[pos]}));

  return (
    <section ref={gameRef} className="screen game screen-enter" style={{'--p':0}}>
      <div className="game__topbar" ref={topbarRef}>
        <div className="game__topbar-left">
          <div className="badge"><span className="badge__dot"></span> 38-0 · LA LIGA</div>
          {!isDone
            ? <div className="round-counter">{t('game.round')} <span>{round}</span>/{TOTAL_ROUNDS}</div>
            : <div className="round-counter" style={{color:'var(--gold)'}}>{t('game.complete')}</div>}
          <div className="slots-summary">
            {slotPills.map(({pos,cap,have})=>(
              <div key={pos} data-pos={pos} className={'slot-pill '+(have>=cap?'done':'needs')}>{POS_ES[pos]} {have}/{cap}</div>
            ))}
          </div>
        </div>
        <div className="topbar-right">
          {genius && <div className="badge" style={{borderColor:'var(--gold-dim)',color:'var(--gold)'}}><span className="badge__dot"></span> {t('game.genius')}</div>}
          <button className="icon-btn" onClick={onReset} title={t('game.reset')} aria-label={t('game.reset')}>↺</button>
          <button className="icon-btn" onClick={onHowto} title={t('landing.howscore')} aria-label={t('landing.howscore')}>?</button>
        </div>
      </div>

      <div className="game__body">
        <div className="game__pitch-col">
          <div className="game__pitch-title">{t('game.yourteam')}</div>
          {(phase==='revealed'||phase==='picked') && currentSpin && (
            <div className="pitch-context" aria-hidden="true">
              <span className="pitch-context__team">{currentSpin.team}</span>
              <span className="pitch-context__era">{decLabel(currentSpin.decade,lang)} · {currentSpin.era}</span>
            </div>
          )}
          <LivePitch roster={roster} slots={SLOTS}/>
        </div>

        <div className="game__panel-col">
          <div className="spin-panel">
            {phase==='idle' && !isDone && (
              <div className="idle-stage">
                <button className="spin-btn" onClick={doSpin} aria-label={t('game.spin')}>
                  <div className="spin-btn__icon">🎲</div>
                  <div className="spin-btn__label">{t('game.spin')}</div>
                </button>
                <p className="idle-hint">{t('game.idlehint')}</p>
              </div>
            )}

            {phase==='spinning' && currentSpin && (
              <div className="spinning-stage">
                <SpinReel/>
              </div>
            )}

            {phase==='reveal' && currentSpin && (
              <div className="spinning-stage">
                <div className="reveal-card">
                  <div className="reveal-card__block">
                    <div className="reveal-card__label">{t('game.team')}</div>
                    <div className="reveal-card__team">{currentSpin.team}</div>
                  </div>
                  <div className="reveal-card__sep"></div>
                  <div className="reveal-card__block">
                    <div className="reveal-card__label">{t('game.decade')}</div>
                    <div className="reveal-card__decade">{decLabel(currentSpin.decade,lang)}</div>
                  </div>
                  <div className="reveal-card__era">{currentSpin.era}</div>
                </div>
              </div>
            )}

            {(phase==='revealed'||phase==='picked') && currentSpin && (
              <div className="revealed-stage">
                <div className="revealed-header">
                  <div className="revealed-team">{currentSpin.team}</div>
                  <div className="revealed-era">{decLabel(currentSpin.decade,lang)} · {currentSpin.era}</div>
                  {phase==='revealed' && !currentPick && anyPickable && (<div className="pick-instruction">{t('game.pick1')}</div>)}
                  {phase==='revealed' && !currentPick && !anyPickable && (<div className="pick-instruction" style={{color:'var(--fwd)'}}>{t('game.noslots')}</div>)}
                  {phase==='revealed' && !currentPick && (
                    <div className="wildcards">
                      <button className="wildcard" disabled={usedTeamWild} onClick={wildTeam} title={t('game.wild.once')}>{t('game.wild.team')}</button>
                      <button className="wildcard" disabled={usedDecadeWild || SPINS_BY_TEAM[currentSpin.team].length<2} onClick={wildDecade} title={t('game.wild.once')}>{t('game.wild.decade')}</button>
                    </div>
                  )}
                </div>

                {anyPickable ? (
                  <div className="players-list">
                    {['GK','DEF','MID','FWD'].map(pos=>{
                      const players = currentSpin.players.filter(p=>p.pos===pos);
                      if(!players.length) return null;
                      return (
                        <div key={pos}>
                          <div className="pos-group-label" data-pos={pos}>{posFull(pos,lang)}{lang==='fr'?'s':'s'}</div>
                          {players.map(p=>{
                            const disabled = !canPick(p);
                            const selected = currentPick && currentPick.id===p.id;
                            const pickedOther = currentPick && !selected;
                            return (
                              <button key={p.id} data-pos={p.pos}
                                className={'pick-card'+(selected?' selected':'')+(disabled?' disabled':'')+(pickedOther&&!selected?' picked-other':'')}
                                onClick={()=>pickPlayer(p)}>
                                <div className="pick-card__pos">{p.posEs}</div>
                                <div className="pick-card__info">
                                  <div className="pick-card__name">{p.name}</div>
                                  <div className="pick-card__sub">{genius ? posFull(p.pos,lang) : (p.pj+' PJ · '+p.g+' '+t('game.goals'))}</div>
                                </div>
                                {!genius && (
                                <div className="pick-card__right">
                                  <div className="pick-card__stars"><Stars value={ratingStars(p.rating)}/></div>
                                  <div className="pick-card__ovr">{p.rating}</div>
                                  <div className="pick-card__ovrlbl">VAL</div>
                                </div>
                                )}
                                <div className="pick-card__check">
                                  {selected && <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="3"><path d="M5 12l5 5 9-10"/></svg>}
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="no-picks">
                    <div className="no-picks__icon">⚠️</div>
                    <div>{t('game.allcovered')}</div>
                    <button className="btn btn--ghost" onClick={skipSpin}>{t('game.spinagain')}</button>
                  </div>
                )}

                {phase==='picked' && currentPick && (
                  <div className="picked-footer">
                    <div className="picked-confirm" data-pos={currentPick.pos}>
                      <div className="picked-confirm__icon">✓</div>
                      <div>
                        <div className="picked-confirm__label">{t('game.signed')}</div>
                        <div className="picked-confirm__name">{currentPick.name}</div>
                        <div className="picked-confirm__pos">{posFull(currentPick.pos,lang)}{genius?'':' · '+t('game.rating')+' '+currentPick.rating}</div>
                      </div>
                      <button className="picked-change" onClick={deselect}>{t('game.change')}</button>
                    </div>
                    {roster.length+1 < TOTAL_ROUNDS
                      ? <button className="btn btn--gold" style={{width:'100%'}} onClick={nextRound}>{t('game.next')}</button>
                      : <button className="btn btn--gold" style={{width:'100%',background:'var(--mid)',color:'#fff'}} onClick={()=>{nextRound();onFinish();}}>{t('game.seeresult')}</button>}
                  </div>
                )}
              </div>
            )}

            {isDone && phase==='idle' && (
              <div className="finish-banner">
                <div className="finish-banner__text">{t('game.teamcomplete',{a:roster.length,b:TOTAL_ROUNDS})}</div>
                <button className="btn btn--gold" onClick={onFinish}>{t('game.seeresult')}</button>
              </div>
            )}
          </div>
        </div>
      </div>
      <p className="disclaimer">{t('disclaimer.short')}</p>
    </section>
  );
}

/* ---- RESULT ---- */
function Result({ roster, onReplay, onHowto, play, genius, fmt, user, onWantLogin, onComplete, onShared }) {
  const t=useT(); const lang=useLang();
  const evalT = ENGINE.evaluateTeam(roster);
  // semilla determinista a partir del XI → veredicto consistente
  let seed = 0; roster.forEach(p=>{ for(let i=0;i<p.id.length;i++) seed=(seed*31+p.id.charCodeAt(i))|0; });
  const sim = ENGINE.simulateSeason(evalT, { sims:2600, seed: seed||12345 });
  const v0 = verdictFor(sim);
  const v = { key:v0.key, tier:v0.tier, title:t('verdict.'+v0.key+'.title'), tag:t('verdict.'+v0.key+'.tag'), sub:t('verdict.'+v0.key+'.sub') };
  const champ = v.tier>=6, epic = v.tier>=5;

  const [show,setShow] = useState(false);
  useEffect(()=>{ const tm=setTimeout(()=>{ setShow(true); play('reveal'); },150); return ()=>clearTimeout(tm); },[]);

  const confetti = champ?Array.from({length:80}).map((_,i)=>({left:Math.random()*100,delay:Math.random()*2.5,dur:2.4+Math.random()*2,color:['#f0c040','#ffe06e','#7a5e18','#eef0f7'][i%4],w:5+Math.random()*5})):[];
  const pct = Math.round(sim.unbeatenProb*1000)/10;
  const attrRows = [
    {n:t('result.attr.attack'), v:evalT.attack}, {n:t('result.attr.defense'), v:evalT.defense},
    {n:t('result.attr.control'), v:evalT.control}, {n:t('result.attr.chem'), v:30+evalT.chemistry*70},
    {n:t('result.attr.balance'), v:evalT.balance*100}, {n:t('result.attr.stars'), v:evalT.starPower},
  ];
  const pts = Math.round(sim.avgPoints);
  const _intro=(lang==='es'?'He montado mi equipo en ':lang==='pt'?'Montei a minha equipa em ':lang==='fr'?'J’ai monté mon équipe sur ':'I built my team on ');
  const _of380=(lang==='es'?'% de hacer el 38-0':lang==='pt'?'% de fazer o 38-0':lang==='fr'?'% de faire 38-0':'% to go 38-0');
  const _beat=(lang==='es'?'. ¿Puedes superarlo? ':lang==='pt'?'. Consegues superar? ':lang==='fr'?'. Tu peux faire mieux ? ':'. Can you beat it? ');
  const shareText = _intro+SITE_NAME+': '+v.title+' · '+pts+' pts'+(pct>=0.1?(' · '+pct+_of380):'')+_beat+SITE_URL;

  const savedRef = useRef(false);
  useEffect(()=>{
    if(savedRef.current) return; savedRef.current = true;
    track('team_completed', { format: fmt.label, verdict: v.title, points: pts, prob: pct });
    if(onComplete) onComplete({ points:pts, prob:pct, format:fmt.label, verdictKey:v.key, verdictTitle:v.title, genius:!!genius });
    if(AUTH_ENABLED && user){
      saveTeam({
        format: fmt.label,
        roster: roster.map(p=>({ id:p.id, name:p.name, pos:p.pos, posEs:p.posEs, rating:p.rating })),
        verdict: v.title, points: pts, unbeaten_prob: pct
      });
    }
  },[]);

  function buildCanvas(){
    const W=1080,H=1350,c=document.createElement('canvas');c.width=W;c.height=H;
    const x=c.getContext('2d');
    function rr(rx,ry,rw,rh,rad){x.beginPath();x.moveTo(rx+rad,ry);x.arcTo(rx+rw,ry,rx+rw,ry+rh,rad);x.arcTo(rx+rw,ry+rh,rx,ry+rh,rad);x.arcTo(rx,ry+rh,rx,ry,rad);x.arcTo(rx,ry,rx+rw,ry,rad);x.closePath();}
    // fondo
    x.fillStyle='#070a14';x.fillRect(0,0,W,H);
    const g=x.createRadialGradient(W/2,240,40,W/2,240,820);
    g.addColorStop(0,'rgba(240,192,64,.16)');g.addColorStop(1,'transparent');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    x.textAlign='center';
    // cabecera
    x.fillStyle='#f0c040';x.font='600 28px Rajdhani,Arial';x.fillText('INVICTOS · 38-0 · '+fmt.label.toUpperCase(),W/2,78);
    x.fillStyle=champ?'#f0c040':'#f7f9ff';x.font='96px "Bebas Neue",Arial';x.fillText(v.title,W/2,172);
    x.fillStyle='#a7b3d6';x.font='500 24px Inter,Arial';x.fillText(v.tag,W/2,210);
    // stats
    const boxes=[[pts,t('result.points').toUpperCase()],[Math.round(sim.avgWins)+'-'+Math.round(sim.avgDraws)+'-'+Math.round(sim.avgLosses),t('result.ved').toUpperCase()],[(pct<0.1?'<0.1':pct)+'%',t('result.prob').toUpperCase()]];
    const bw=276,gap=20,sx=(W-(bw*3+gap*2))/2,by=246;
    boxes.forEach((b,i)=>{const bx=sx+i*(bw+gap);x.strokeStyle='rgba(255,255,255,.12)';x.lineWidth=2;x.strokeRect(bx,by,bw,104);
      x.fillStyle='#f7f9ff';x.font='54px "Bebas Neue",Arial';x.fillText(String(b[0]),bx+bw/2,by+60);
      x.fillStyle='#8090b5';x.font='600 18px Rajdhani,Arial';x.fillText(b[1],bx+bw/2,by+90);});
    // ===== CAMPO con la alineación tal cual =====
    const pw=640,ph=730,px=(W-pw)/2,py=394;
    const grad=x.createLinearGradient(0,py,0,py+ph);grad.addColorStop(0,'#11402a');grad.addColorStop(1,'#0a2b1a');
    x.fillStyle=grad;rr(px,py,pw,ph,18);x.fill();
    x.save();rr(px,py,pw,ph,18);x.clip();
    for(let i=0;i<10;i++){if(i%2===0){x.fillStyle='rgba(255,255,255,.022)';x.fillRect(px,py+i*(ph/10),pw,ph/10);}}
    x.restore();
    x.strokeStyle='rgba(255,255,255,.32)';x.lineWidth=3;
    rr(px+16,py+16,pw-32,ph-32,8);x.stroke();
    x.beginPath();x.moveTo(px+16,py+ph/2);x.lineTo(px+pw-16,py+ph/2);x.stroke();
    x.beginPath();x.arc(px+pw/2,py+ph/2,66,0,Math.PI*2);x.stroke();
    x.strokeRect(px+pw/2-115,py+16,230,92);
    x.strokeRect(px+pw/2-115,py+ph-16-92,230,92);
    // nodos en su posición de la formación
    const byPos={GK:[],DEF:[],MID:[],FWD:[]};roster.forEach(p=>byPos[p.pos].push(p));
    const COL={GK:'#f59e0b',DEF:'#3b82f6',MID:'#22c55e',FWD:'#ef4444'};
    const filled=fmt.slots.map(function(s,i){var idx=fmt.slots.slice(0,i).filter(function(z){return z.pos===s.pos;}).length;return {pos:s.pos,x:s.x,y:s.y,player:byPos[s.pos][idx]||null};});
    filled.forEach(function(s){ if(!s.player)return;
      var cx=px+(s.x/100)*pw, cy=py+(s.y/100)*ph, r=30;
      x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fillStyle='rgba(8,12,22,.95)';x.fill();
      x.lineWidth=3;x.strokeStyle=COL[s.pos];x.stroke();
      x.fillStyle=COL[s.pos];x.font='700 16px Rajdhani,Arial';x.textAlign='center';x.fillText(s.player.posEs,cx,cy+6);
      var name=s.player.name;x.font='28px "Bebas Neue",Arial';var tw=x.measureText(name).width;
      x.fillStyle='rgba(5,8,16,.8)';rr(cx-tw/2-9,cy+r+6,tw+18,30,7);x.fill();
      x.fillStyle='#f7f9ff';x.fillText(name,cx,cy+r+28);
      if(!genius){x.fillStyle='#f0c040';x.font='700 16px Rajdhani,Arial';x.fillText(String(s.player.rating),cx,cy-r-8);}
    });
    // footer marca
    x.textAlign='center';
    x.fillStyle='#f0c040';x.font='86px "Bebas Neue",Arial';x.fillText(SITE_NAME,W/2,H-86);
    x.fillStyle='#9aa8cf';x.font='600 28px Rajdhani,Arial';x.fillText(SITE_URL+' · '+t('nav.tagline'),W/2,H-48);
    return c;
  }
  function downloadImg(){ buildCanvas().toBlob(function(b){const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='invictos-mi-equipo.png';a.click();setTimeout(function(){URL.revokeObjectURL(u);},1500);}); }
  function shareNative(){
    if(onShared) onShared();
    buildCanvas().toBlob(async function(b){
      const file=new File([b],'invictos.png',{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share({title:SITE_NAME,text:shareText,files:[file]}); return; }catch(e){}
      }
      window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText),'_blank');
    });
  }
  function copyText(){ if(navigator.clipboard) navigator.clipboard.writeText(shareText); if(onShared) onShared(); }

  return (
    <section className={'screen result screen-enter '+(champ?'is-champ':'')}>
      {champ && (<div className="confetti">{confetti.map((c,i)=>(<i key={i} style={{left:c.left+'%',width:c.w,height:c.w*1.7,background:c.color,animationDelay:c.delay+'s',animationDuration:c.dur+'s'}}/>))}</div>)}

      <div className="verdict stagger">
        {epic && <div className="verdict__kicker">INVICTOS</div>}
        <h1 className="verdict__title">{v.title}</h1>
        <div className="verdict__tag">{v.tag}</div>
        <p className="verdict__sub">{v.sub}</p>
      </div>

      <div className="bigstats">
        <div className="bigstat gold"><div className="bigstat__num">{Math.round(sim.avgPoints)}</div><div className="bigstat__lbl">{t('result.points')}</div></div>
        <div className="bigstat"><div className="bigstat__num">{Math.round(sim.avgWins)}-{Math.round(sim.avgDraws)}-{Math.round(sim.avgLosses)}</div><div className="bigstat__lbl">{t('result.ved')}</div></div>
        <div className="bigstat"><div className="bigstat__num">{Math.round(sim.avgGF)}:{Math.round(sim.avgGA)}</div><div className="bigstat__lbl">{t('result.goals')}</div></div>
        <div className="bigstat gold"><div className="bigstat__num">{pct<0.1?'<0.1':pct}%</div><div className="bigstat__lbl">{t('result.prob')}</div></div>
      </div>

      <div className="attrs">
        <div className="attrs__title">{t('result.analysis')}</div>
        {attrRows.map((a,i)=>(
          <div className="attr" key={i}>
            <div className="attr__name">{a.n}</div>
            <div className="attr__track"><div className="attr__fill" style={{width:show?Math.min(100,Math.max(4,a.v))+'%':'0%'}}/></div>
            <div className="attr__val">{Math.round(a.v)}</div>
          </div>
        ))}
      </div>

      <div className="result__xi">
        {roster.map(p=>(
          <div key={p.id} data-pos={p.pos} className="mini-card">
            <div className="mini-card__pos">{p.posEs}</div>
            <div className="mini-card__name">{p.name}</div>
            <div className="mini-card__ovr">{p.rating}</div>
          </div>
        ))}
      </div>

      <div className="result__actions">
        <button className="btn btn--gold" onClick={downloadImg}>{t('result.download')}</button>
        <button className="btn btn--outline" onClick={shareNative}>{t('result.share')}</button>
        <button className="btn btn--outline" onClick={onReplay}>{t('result.replay')}</button>
      </div>
      <div className="share-bar">
        <a className="share-btn" style={{'--sc':'#1d9bf0'}} href={'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)} target="_blank" rel="noopener" onClick={onShared}>𝕏</a>
        <a className="share-btn" style={{'--sc':'#25d366'}} href={'https://wa.me/?text='+encodeURIComponent(shareText)} target="_blank" rel="noopener" onClick={onShared}>WhatsApp</a>
        <a className="share-btn" style={{'--sc':'#2aabee'}} href={'https://t.me/share/url?url='+encodeURIComponent('https://'+SITE_URL)+'&text='+encodeURIComponent(shareText)} target="_blank" rel="noopener" onClick={onShared}>Telegram</a>

/* ---- SONIDO ---- */
function useSound(){
  const [on,setOn]=useState(false); const ac=useRef(null);
  const ensure=()=>{if(!ac.current)ac.current=new(window.AudioContext||window.webkitAudioContext)();if(ac.current.state==='suspended')ac.current.resume();return ac.current;};
  const play=useCallback((name)=>{ if(!on)return; const ctx=ensure(),t=ctx.currentTime;
    const env=(g,a,d,pk=.3)=>{g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(pk,t+a);g.gain.exponentialRampToValueAtTime(.0001,t+a+d);};
    if(name==='whoosh'){const buf=ctx.createBuffer(1,ctx.sampleRate*1.1,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=ctx.createBufferSource();src.buffer=buf;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(300,t);f.frequency.exponentialRampToValueAtTime(2200,t+.7);const g=ctx.createGain();env(g,.05,1,.22);src.connect(f).connect(g).connect(ctx.destination);src.start(t);src.stop(t+1.1);}
    else if(name==='reveal'){[261.6,329.6,392,523.2].forEach((fr,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=fr;const st=t+i*.08;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.1,st+.04);g.gain.exponentialRampToValueAtTime(.0001,st+1.3);const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=1800;o.connect(f).connect(g).connect(ctx.destination);o.start(st);o.stop(st+1.4);});}
    else if(name==='select'){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(660,t+.08);env(g,.003,.12,.14);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+.16);}
  },[on]);
  const toggle=()=>setOn(v=>{if(!v)ensure();return!v;});
  return {on,toggle,play};
}
function SoundBtn({on,toggle}){
  return (<button className="icon-btn" style={{position:'fixed',top:12,right:14,zIndex:210,color:on?'var(--gold)':'var(--muted)'}} onClick={toggle} title="Sonido">{on?'♪':'♪̸'}</button>);
}

function traducirError(m, lang){
  lang=lang||CUR_LANG;
  if(/already registered|already exists|User already/i.test(m)) return tr('auth.err.dup',lang);
  if(/Invalid login credentials/i.test(m)) return tr('auth.err.bad',lang);
  if(/Email not confirmed/i.test(m)) return tr('auth.err.unconfirmed',lang);
  if(/rate limit|too many|For security/i.test(m)) return tr('auth.err.rate',lang);
  if(/password/i.test(m)) return tr('auth.err.pwlen',lang);
  return m;
}
function fmtFecha(s){ try{ return new Date(s).toLocaleDateString(CUR_LANG||'es',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return ''; } }

function AuthModal({ onClose, onAuthed, onOpenLegal }){
  const t=useT(); const lang=useLang();
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');
  const [age,setAge]=useState(false); const [priv,setPriv]=useState(false);
  const [msg,setMsg]=useState(null); const [busy,setBusy]=useState(false);
  async function submit(e){
    e.preventDefault(); setMsg(null);
    if(!email || !pw){ setMsg({t:'err',x:t('auth.err.fill')}); return; }
    if(mode==='register'){
      if(pw.length<8){ setMsg({t:'err',x:t('auth.err.pwlen')}); return; }
      if(!age){ setMsg({t:'err',x:t('auth.err.age')}); return; }
      if(!priv){ setMsg({t:'err',x:t('auth.err.priv')}); return; }
    }
    setBusy(true);
    try{

      if(mode==='register' && res.data && !res.data.session){
        setMsg({t:'ok',x:t('auth.ok.created')});

      }
      track(mode==='register'?'sign_up':'login');

    const f=e.target.files&&e.target.files[0]; if(!f) return;
    if(f.size>3*1024*1024){ setMsg('>3MB'); return; }
