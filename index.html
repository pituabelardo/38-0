  <!-- Blindaje React vs mutaciones DOM de scripts de terceros (AdSense/Auto Ads/CMP): si removeChild/insertBefore reciben una referencia que no es hija real del nodo, se evita el NotFoundError que tumba el render de React. Solo neutraliza operaciones que YA iban a fallar; las legitimas pasan intactas. -->
  <script>
  (function(){
    if(window.__domGuard) return; window.__domGuard=1;
    var rc=Node.prototype.removeChild;
    Node.prototype.removeChild=function(child){
      if(child&&child.parentNode!==this){ return child; }
      return rc.apply(this,arguments);
    };
    var ib=Node.prototype.insertBefore;
    Node.prototype.insertBefore=function(node,ref){
      if(ref&&ref.parentNode!==this){ return node; }
      return ib.apply(this,arguments);
    };
  })();
  </script>

  <!-- Cierre con Esc para cualquier modal abierto (RegisterModal, modales legales, etc.). Hace clic en el boton de cierre visible mas reciente, respetando su onClose nativo (incluido el tracking reg_popup_dismiss). No interfiere con el juego: solo actua si hay un modal con .modal__close presente en el DOM. -->
  <script>
  (function(){
    document.addEventListener('keydown',function(e){
      if(e.key!=='Escape'&&e.keyCode!==27) return;
      var btns=document.querySelectorAll('.modal__close');
      for(var i=btns.length-1;i>=0;i--){
        if(btns[i].offsetParent!==null){ btns[i].click(); break; }
      }
    });
  })();
  </script>

  <style>
:root{
  --void:#05070f; --deep:#0a0e1a; --surface:#141929; --elevated:#1e2740; --border:#1f2d4d;
  --gold:#f0c040; --gold-bright:#ffe06e; --gold-dim:#7a5e18; --gold-glow:rgba(240,192,64,.15);
  --pitch:#0d3320; --pitch-line:rgba(255,255,255,.14);
  --text:#f3f5fb; --muted:#a7b3d6; --subtle:#7b89ad;
  --gk:#f59e0b; --def:#3b82f6; --mid:#22c55e; --fwd:#ef4444;
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-xl:30px; --r-pill:9999px;
  --shadow-gold:0 0 20px rgba(240,192,64,.3),0 0 60px rgba(240,192,64,.1);
  --shadow-card:0 8px 32px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.04) inset;
  --ease:cubic-bezier(.22,1,.36,1);
}
[data-pos="GK"]{--pos:var(--gk);}[data-pos="DEF"]{--pos:var(--def);}
[data-pos="MID"]{--pos:var(--mid);}[data-pos="FWD"]{--pos:var(--fwd);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{background:var(--void);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
*{-webkit-tap-highlight-color:transparent;}
button,a,.btn,.fmt-chip,.mode-chip,.pick-card,.spin-btn,.icon-btn,.wildcard,.menu-toggle{touch-action:manipulation;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important;}}
#root{min-height:100dvh;position:relative;z-index:1;}
h1,h2,h3{font-weight:400;line-height:.95;}
.label{font-family:'Rajdhani',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.15em;font-size:11px;color:var(--muted);}

/* FX */
.particle-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.85;}
.progressbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;pointer-events:none;}
.progressbar__fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold));box-shadow:0 0 10px var(--gold);transition:width .6s var(--ease);}

/* Buttons */
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:.1em;border:none;cursor:pointer;border-radius:var(--r-pill);display:inline-flex;align-items:center;justify-content:center;gap:.5em;transition:transform .12s var(--ease),background .2s,box-shadow .25s,color .2s;user-select:none;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn--gold{background:var(--gold);color:var(--void);font-size:19px;padding:15px 46px;}
.btn--gold:hover{background:var(--gold-bright);box-shadow:var(--shadow-gold);}
.btn--outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold-dim);font-size:16px;padding:12px 28px;}
.btn--outline:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);}
.btn--ghost{background:rgba(255,255,255,.03);color:var(--muted);border:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.12em;padding:9px 16px;border-radius:var(--r-pill);cursor:pointer;}
.btn--ghost:hover{color:var(--text);border-color:var(--gold-dim);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-pill);border:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);background:rgba(10,14,26,.5);}
.badge__dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
.stars{display:inline-flex;gap:2px;color:var(--gold);}
.stars svg{width:1em;height:1em;display:block;}
.stars .off{color:var(--subtle);}

/* Screens — robustez: nada de overflow:hidden que recorte texto */
.screen{position:relative;z-index:1;min-height:100dvh;}
.screen-enter{animation:screenIn .4s var(--ease);}
@keyframes screenIn{from{transform:translateY(12px)}to{transform:translateY(0)}}
.stagger>*{animation:itemIn .5s var(--ease) backwards;}
/* entrada solo con desplazamiento: el texto NUNCA queda translúcido (no se apaga) */
@keyframes itemIn{from{transform:translateY(16px)}to{transform:translateY(0)}}

.disclaimer{text-align:center;padding:18px 20px 14px;font-size:10px;color:var(--subtle);max-width:760px;margin:0 auto;line-height:1.5;}

/* Pitch backdrop */
.pitch-bg{position:fixed;inset:0;z-index:0;pointer-events:none;display:grid;place-items:center;overflow:hidden;}
.pitch-bg__field{position:relative;width:min(760px,94vw);aspect-ratio:1.05/1;border:2px solid var(--pitch-line);background:radial-gradient(ellipse at center,rgba(255,255,255,.03),transparent 50%),linear-gradient(rgba(5,7,15,.4),rgba(5,7,15,.6)),var(--pitch);transform:perspective(1400px) rotateX(46deg) scale(1.12);border-radius:2px;opacity:.4;}
.pitch-bg__field::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:var(--pitch-line);}
.pitch-bg__field::after{content:'';position:absolute;left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border:2px solid var(--pitch-line);border-radius:50%;}
.pitch-bg__vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(5,7,15,.8) 92%);}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:60px 20px 30px;min-height:100dvh;}
.landing__inner{display:flex;flex-direction:column;align-items:center;gap:22px;max-width:480px;}
.wordmark{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,128px);letter-spacing:-.01em;line-height:.82;color:var(--text);text-shadow:0 0 60px rgba(240,192,64,.12);}
.wordmark__rule{width:64px;height:2px;background:var(--gold);margin:14px auto 0;box-shadow:0 0 12px var(--gold);}
.tagline{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4.4vw,46px);letter-spacing:.09em;color:var(--gold);}
.lede{font-size:15px;line-height:1.65;color:var(--muted);max-width:380px;}
.landing__actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;}
.landing__stats{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle);font-variant-numeric:tabular-nums;}
.steps3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:480px;margin-top:2px;}
.step3{display:flex;flex-direction:column;gap:6px;padding:14px 14px 16px;border:1px solid var(--border);border-radius:var(--r-lg);background:rgba(255,255,255,.02);text-align:left;}
.step3__n{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--gold);}
.step3__t{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.02em;color:var(--text);}
.step3__d{font-size:12px;line-height:1.4;color:var(--muted);}
@media(max-width:560px){.steps3{grid-template-columns:1fr;gap:8px;}.step3{flex-direction:row;align-items:center;gap:12px;padding:10px 12px;}.step3__n{font-size:20px;min-width:22px;}}

/* MODAL — explicación puntuación */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(3,5,11,.78);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{position:relative;width:min(640px,100%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:26px 26px 30px;margin:auto;animation:itemIn .35s var(--ease);}
.modal__close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-size:18px;line-height:1;display:grid;place-items:center;}
.modal__close:hover{color:var(--text);border-color:var(--gold-dim);}
.modal__kicker{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:11px;color:var(--gold);}
.modal__title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.01em;margin:4px 0 14px;}
.modal h4{font-family:'Rajdhani',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:13px;color:var(--text);margin:18px 0 7px;display:flex;align-items:center;gap:8px;}
.modal h4 .dotc{width:8px;height:8px;border-radius:50%;}
.modal p{font-size:13.5px;line-height:1.6;color:var(--muted);margin-bottom:6px;}
.modal p b{color:var(--text);font-weight:600;}
.modal__factors{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 4px;}
.factor{background:var(--deep);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;}
.factor__name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text);}
.factor__desc{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:3px;}

/* GAME */
.game{display:grid;grid-template-rows:auto 1fr;min-height:100dvh;}
.game__topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px 10px;border-bottom:1px solid var(--border);background:rgba(5,7,15,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30;}
.game__topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.round-counter{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;}
.round-counter span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;}
.icon-btn:hover{color:var(--gold);border-color:var(--gold-dim);}
.slots-summary{display:flex;gap:6px;flex-wrap:wrap;}
.slot-pill{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-pill);border:1px solid var(--border);color:var(--subtle);}
.slot-pill.needs{color:var(--pos);border-color:var(--pos);}
.slot-pill.done{color:var(--mid);border-color:var(--mid);opacity:.7;}

.game__body{display:grid;grid-template-columns:minmax(340px,460px) minmax(420px,1fr);align-items:stretch;min-height:0;max-width:1180px;margin:0 auto;width:100%;}
.game__pitch-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 24px;border-right:1px solid var(--border);background:rgba(5,7,15,.3);gap:6px;}
.game__pitch-title{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--subtle);margin-bottom:10px;}
/* Cabecera del equipo SIEMPRE visible sobre el campo (máxima jerarquía):
   "EQUIPO · DÉCADA" en grande + descripción debajo. */
.pitch-heading{text-align:center;width:100%;margin-bottom:4px;}
.pitch-heading__team{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:.96;letter-spacing:.01em;color:#f7f9ff;}
.pitch-heading__era{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.2;}
.live-pitch{position:relative;width:100%;max-width:384px;aspect-ratio:2/3;border-radius:var(--r-lg);overflow:hidden;background:radial-gradient(ellipse at 50% 40%,rgba(255,255,255,.04),transparent 65%),repeating-linear-gradient(118deg,transparent 0 26px,rgba(255,255,255,.015) 26px 52px),var(--pitch);border:1px solid rgba(255,255,255,.08);}
.live-pitch__lines{position:absolute;inset:12px;border:1.5px solid var(--pitch-line);border-radius:3px;}
.live-pitch__halfway{position:absolute;left:12px;right:12px;top:50%;height:1.5px;background:var(--pitch-line);}
.live-pitch__circle{position:absolute;left:50%;top:50%;width:22%;aspect-ratio:1;transform:translate(-50%,-50%);border:1.5px solid var(--pitch-line);border-radius:50%;}
.live-pitch__box{position:absolute;left:50%;transform:translateX(-50%);width:46%;height:14%;border:1.5px solid var(--pitch-line);}
.live-pitch__box--top{top:0;border-top:none;}.live-pitch__box--bot{bottom:0;border-bottom:none;}
.pnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
.pnode.filled{animation:nodeIn .5s var(--ease);}
@keyframes nodeIn{from{transform:translate(-50%,-50%) scale(.4);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.pnode__disc{width:42px;height:42px;border-radius:50%;background:rgba(10,14,26,.95);border:2px solid var(--pos);box-shadow:0 0 14px -3px var(--pos);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--pos);}
.pnode.empty .pnode__disc{border-style:dashed;border-color:rgba(58,74,106,.6);box-shadow:none;opacity:.5;color:var(--subtle);}
.pnode__name{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.02em;color:var(--text);text-shadow:0 1px 4px #000;text-align:center;line-height:1;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pnode.empty .pnode__name{color:var(--subtle);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}

.game__panel-col{display:flex;flex-direction:column;background:var(--deep);min-height:0;}
.spin-panel{display:flex;flex-direction:column;flex:1;min-height:0;}

.idle-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:36px 24px;text-align:center;}
.spin-btn{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(240,192,64,.12),transparent 60%),var(--surface);border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .3s var(--ease);animation:breathe 2.4s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(1);border-color:var(--border)}50%{transform:scale(1.04);border-color:var(--gold-dim)}}
.spin-btn:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);transform:scale(1.06);animation:none;}
.spin-btn__icon{font-size:46px;line-height:1;}
.spin-btn__label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;}
.idle-hint{font-size:13px;color:var(--muted);max-width:220px;line-height:1.5;}

.spinning-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 24px;}
.spin-card{width:250px;border-radius:var(--r-xl);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-card);padding:24px 22px;display:flex;flex-direction:column;gap:6px;}
.spin-card.is-spinning{animation:flip 1.05s var(--ease);}
@keyframes flip{0%{transform:perspective(1100px) rotateY(0)}45%{transform:perspective(1100px) rotateY(90deg);filter:blur(2px)}55%{transform:perspective(1100px) rotateY(90deg);filter:blur(2px)}100%{transform:perspective(1100px) rotateY(0)}}
.spin-card__decade{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);}
.spin-card__era{font-size:11px;color:var(--subtle);}
.spin-card__team{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:.9;margin-top:6px;}
.spin-card__count{color:var(--muted);font-size:12px;margin-top:4px;}

.revealed-stage{display:flex;flex-direction:column;flex:1;min-height:0;}
.revealed-header{padding:15px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;background:var(--deep);}
.revealed-team{font-family:'Bebas Neue',sans-serif;font-size:27px;line-height:1;}
.dec-accent{color:var(--gold);white-space:nowrap;}
.revealed-era{font-size:12px;color:var(--muted);margin-top:2px;}
.pick-instruction{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);}
.pick-instruction::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
.players-list{flex:1;overflow-y:auto;padding:12px 16px 16px;display:flex;flex-direction:column;gap:7px;}
.players-list::-webkit-scrollbar{width:5px;}
.players-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.pos-group-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:6px 0 3px;color:var(--pos);}
.pick-card{width:100%;display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--pos);cursor:pointer;text-align:left;transition:transform .15s var(--ease),background .18s,box-shadow .2s,border-color .18s;}
.pick-card:hover:not(.disabled){background:var(--elevated);transform:translateX(4px);border-color:var(--pos);}
.pick-card.selected{border:2px solid var(--pos);border-left-width:3px;background:color-mix(in oklab,var(--pos) 12%,var(--surface));box-shadow:0 0 0 1px var(--pos),0 0 20px -4px var(--pos);transform:translateX(4px);}
.pick-card.picked-other{opacity:.5;}
.pick-card.disabled{opacity:.3;cursor:not-allowed;}
.picked-change{margin-left:auto;align-self:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-pill);padding:7px 12px;cursor:pointer;transition:all .2s;}
.picked-change:hover{color:var(--text);border-color:var(--fwd);}
.pick-card__pos{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;color:var(--pos);width:26px;flex-shrink:0;}
.pick-card__info{flex:1;min-width:0;}
.pick-card__name{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1;letter-spacing:.01em;}
.pick-card__sub{font-size:11px;color:var(--muted);margin-top:3px;}
.pick-card__right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.pick-card__stars{font-size:10px;}
.pick-card__ovr{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--gold);line-height:1;}
.pick-card__ovrlbl{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:8px;letter-spacing:.1em;color:var(--subtle);text-transform:uppercase;}
.pick-card__check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:grid;place-items:center;color:var(--gold);flex-shrink:0;transition:all .2s;}
.pick-card.selected .pick-card__check{border-color:var(--gold);background:var(--gold);color:var(--void);}
.no-picks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:30px 24px;text-align:center;color:var(--muted);font-size:14px;}
.no-picks__icon{font-size:32px;opacity:.5;}
.picked-footer{padding:14px 18px;border-top:1px solid var(--border);background:var(--deep);display:flex;flex-direction:column;gap:10px;position:sticky;bottom:0;z-index:5;}
.picked-confirm{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:var(--r-md);background:color-mix(in oklab,var(--mid) 8%,var(--surface));border:1px solid var(--mid);}
.picked-confirm__icon{color:var(--mid);font-size:18px;}
.picked-confirm__label{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);}
.picked-confirm__name{font-family:'Bebas Neue',sans-serif;font-size:21px;}
.picked-confirm__pos{font-size:11px;color:var(--muted);}
.finish-banner{padding:16px 20px;border-top:1px solid var(--gold-dim);background:rgba(240,192,64,.05);display:flex;flex-direction:column;align-items:center;gap:10px;}
.finish-banner__text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);}

/* RESULT */
.result{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:50px 20px 20px;min-height:100dvh;}
.verdict{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:600px;}
.verdict__kicker{display:flex;align-items:center;gap:12px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.3em;font-size:12px;color:var(--gold);}
.verdict__kicker::before,.verdict__kicker::after{content:'✦';}
.verdict__title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,78px);line-height:.86;letter-spacing:.01em;color:#f7f9ff;text-shadow:0 2px 22px rgba(0,0,0,.9);}
.is-champ .verdict__title{color:var(--gold);text-shadow:0 0 50px rgba(240,192,64,.6),0 0 120px rgba(240,192,64,.3);}
.verdict__tag{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:13px;color:var(--gold);}
.verdict__sub{color:var(--muted);font-size:14px;line-height:1.5;max-width:460px;}

/* big stat row */
.bigstats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.bigstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 18px;min-width:96px;}
.bigstat__num{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--text);}
.bigstat.gold .bigstat__num{color:var(--gold);}
.bigstat__lbl{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
/* Fila héroe del resultado: PUESTO · PUNTOS · RÉCORD muy grandes y claros. */
.bigstats--hero{gap:12px;margin-top:8px;}
.bigstats--hero .bigstat{min-width:110px;padding:16px 22px;border-color:var(--gold-dim);}
.bigstats--hero .bigstat__num{font-size:48px;}
.bigstats--hero .bigstat__lbl{font-size:11px;margin-top:6px;}
/* Goles proyectados y probabilidad: secundarios, mucho más pequeños. */
.substats{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:12px;color:var(--muted);text-align:center;}
.substat b{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--text);font-size:13px;}
.substat-dot{color:var(--subtle);}

/* attribute bars */
.attrs{width:100%;max-width:460px;display:flex;flex-direction:column;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;}
.attrs__title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--subtle);margin-bottom:2px;text-align:left;}
.attr{display:grid;grid-template-columns:96px 1fr 38px;align-items:center;gap:10px;}
.attr__name{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:.04em;color:var(--muted);text-align:left;text-transform:uppercase;}
.attr__track{height:8px;border-radius:var(--r-pill);background:var(--deep);overflow:hidden;}
.attr__fill{height:100%;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1s var(--ease);}
.attr__val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--text);text-align:right;}

.result__xi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:520px;}
.mini-card{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--pos);border-radius:var(--r-sm);padding:9px 6px;text-align:center;}
.mini-card__pos{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;letter-spacing:.08em;color:var(--pos);}
.mini-card__name{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;margin:4px 0;}
.mini-card__ovr{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:var(--gold);}
.result__actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:250;overflow:hidden;}
.confetti i{position:absolute;top:-16px;width:7px;height:12px;border-radius:1px;background:var(--gold);opacity:.9;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0}}

@media(min-width:821px){
  /* En escritorio el juego cabe en la pantalla: el campo queda fijo a la
     izquierda y la lista de jugadores hace su propio scroll a la derecha. */
  .game{height:100dvh;}
}
@media(max-width:820px){
  /* --p = progreso de scroll 0..1 (lo fija el JS por frame). El campo encoge
     de forma CONTINUA ligada al dedo; sin transiciones que peleen con el scroll. */
  .game__body{grid-template-columns:1fr;grid-template-rows:auto auto;}
  .game__pitch-col{position:sticky;top:var(--topbar-h,52px);z-index:20;border-right:none;border-bottom:1px solid var(--border);
    padding:calc(6px + (1 - var(--p,0))*8px) 16px calc(6px + (1 - var(--p,0))*6px);
    flex-direction:column;justify-content:flex-start;gap:6px;background:var(--deep);
    box-shadow:0 8px 22px -12px rgba(0,0,0,calc(.7*var(--p,0)));}
  .game__pitch-title{display:block;margin:0;line-height:1.1;overflow:hidden;
    opacity:clamp(0, calc(1 - var(--p,0)*1.8), 1);
    max-height:calc((1 - var(--p,0)) * 22px);}
  /* La cabecera EQUIPO·DÉCADA permanece SIEMPRE legible (es lo que más se
     consulta); solo la descripción se colapsa al encoger para ganar sitio. */
  .pitch-heading{margin-bottom:2px;}
  .pitch-heading__team{font-size:calc(22px + (1 - var(--p,0))*4px);}
  .pitch-heading__era{margin-top:2px;
    opacity:clamp(0, calc(1.1 - var(--p,0)*2.2), 1);
    max-height:calc((1 - clamp(0, calc(var(--p,0)*1.8), 1)) * 20px);overflow:hidden;}
  .live-pitch{width:calc(34vw + (1 - var(--p,0))*38vw);max-width:calc(126px + (1 - var(--p,0))*174px);
    height:auto;aspect-ratio:2/3;flex-shrink:0;transform-origin:top center;will-change:width;}
  .pnode__disc{width:calc(23px + (1 - var(--p,0))*15px);height:calc(23px + (1 - var(--p,0))*15px);
    font-size:calc(9px + (1 - var(--p,0))*3px);}
  .pnode__name{font-size:9px;max-width:58px;opacity:clamp(0, calc(1 - var(--p,0)*2), 1);}
  .revealed-header{position:static;}
  .slots-summary{order:3;}
  .result__xi{grid-template-columns:repeat(2,1fr);}
  .modal__factors{grid-template-columns:1fr;}
  .spin-reel__team{font-size:28px;}
  /* fila héroe del resultado en UNA línea limpia en móvil */
  .bigstats--hero{gap:8px;width:100%;flex-wrap:nowrap;}
  .bigstats--hero .bigstat{flex:1;min-width:0;padding:13px 6px;}
  .bigstats--hero .bigstat__num{font-size:clamp(26px,8.5vw,40px);}
  .bigstats--hero .bigstat__lbl{font-size:10px;}
  /* ===== FASES IDLE / SPINNING / REVEAL en móvil: pantalla dividida clara —
     campo a tamaño FIJO arriba, y la acción (GIRAR o los dados/equipo que sale)
     protagonista centrada en la mitad inferior, sin saltos de layout. ===== */
  .game--split .game__pitch-col{position:static;padding:14px 16px 10px;}
  .game--split .live-pitch{width:min(40vw,164px);max-width:164px;}
  .game--split .pnode__disc{width:24px;height:24px;font-size:9px;}
  .game--split .pnode__name{font-size:8px;opacity:1;max-width:48px;}
  .game--split .game__pitch-title{opacity:1;max-height:18px;margin:0;}
  /* el panel ocupa el resto del viewport para centrar la acción */
  .game--split .game__panel-col{min-height:calc(100dvh - var(--topbar-h,96px) - 300px);}
  .game--split .idle-stage{gap:22px;padding:24px 24px 40px;}
  .game--split .spin-btn{width:min(58vw,210px);height:min(58vw,210px);
    box-shadow:0 0 0 1px var(--gold-dim),0 14px 50px -12px var(--gold-glow,rgba(240,192,64,.5));border-color:var(--gold-dim);}
  .game--split .spin-btn__icon{font-size:56px;}
  .game--split .spin-btn__label{font-size:26px;}
  .game--split .idle-hint{max-width:260px;font-size:14px;}
  .game--split .spinning-stage{padding:18px 20px;}
  /* comodines pegados al campo sticky → SIEMPRE accesibles aunque hagas scroll */
  .wildcards--sticky{margin-top:10px;width:100%;display:flex;gap:8px;justify-content:center;}
  .wildcards--sticky .wildcard{flex:1;max-width:170px;}
}
@media(max-width:820px) and (prefers-reduced-motion:reduce){
  /* misma intención, recorrido más suave (menos diferencia de tamaño) */
  .live-pitch{width:calc(46vw + (1 - var(--p,0))*26vw);max-width:calc(170px + (1 - var(--p,0))*130px);}
  .pnode__disc{width:calc(28px + (1 - var(--p,0))*10px);height:calc(28px + (1 - var(--p,0))*10px);}
}

/* ===== Fondo atractivo (sin oscurecer el contenido) ===== */
.app-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1100px 620px at 50% -8%, rgba(240,192,64,.13), transparent 62%),
    radial-gradient(820px 520px at 10% 106%, rgba(60,90,170,.13), transparent 60%),
    radial-gradient(820px 520px at 92% 102%, rgba(120,60,160,.09), transparent 60%);
}
.app-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(3,5,11,.5) 100%);}

/* Legibilidad reforzada */
.pick-card__name{color:#f5f7fd;}
.mini-card__name{color:#f5f7fd;}
.revealed-team{color:#f7f9ff;}
.spin-card__team{color:#f7f9ff;}

/* Selector de formato */
.fmt-select{display:inline-flex;gap:6px;background:rgba(10,14,26,.55);border:1px solid var(--border);border-radius:var(--r-pill);padding:5px;}
.fmt-chip{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;border-radius:var(--r-pill);padding:8px 16px;cursor:pointer;transition:all .2s;}
.fmt-chip.on{background:var(--gold);color:var(--void);}
.fmt-chip:not(.on):hover{color:var(--text);}
.fmt-row{display:flex;flex-direction:column;align-items:center;gap:7px;}
.fmt-row__label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

/* SpinReel — tragaperras */
.spin-reel{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;padding:30px 28px;border-radius:var(--r-xl);background:var(--surface);border:1px solid var(--gold-dim);box-shadow:var(--shadow-card),0 0 50px -10px var(--gold-glow);min-width:250px;overflow:hidden;animation:reelPulse 1.6s ease-in-out infinite;}
@keyframes reelPulse{0%,100%{box-shadow:var(--shadow-card),0 0 40px -14px var(--gold-glow)}50%{box-shadow:var(--shadow-card),0 0 64px -8px var(--gold-glow)}}
.spin-reel__dice{font-size:42px;line-height:1;animation:diceSpin .5s linear infinite;}
@keyframes diceSpin{to{transform:rotate(360deg)}}
.spin-reel__decade{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);opacity:.85;}
.spin-reel__team{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:#fff;text-align:center;min-height:40px;}
.spin-reel__hint{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
.spin-reel__glow{position:absolute;inset:-50%;background:conic-gradient(from 0deg,transparent,var(--gold-glow),transparent 38%);animation:diceSpin 1.3s linear infinite;pointer-events:none;}

/* Comodines */
.wildcards{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.wildcard{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);background:rgba(240,192,64,.08);border:1px solid var(--gold-dim);border-radius:var(--r-pill);padding:7px 13px;cursor:pointer;transition:all .2s;}
.wildcard:hover:not(:disabled){background:rgba(240,192,64,.16);border-color:var(--gold);}
.wildcard:disabled{opacity:.32;cursor:not-allowed;text-decoration:line-through;}

/* Compartir */
.share-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;max-width:560px;}
.share-btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;color:var(--sc,var(--muted));background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-pill);padding:9px 16px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;}
.share-btn:hover{border-color:var(--sc,var(--gold-dim));box-shadow:0 0 16px -6px var(--sc,var(--gold));color:var(--sc,var(--text));}

/* Selector de MODO (competición) */
.mode-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;}
.mode-chip{position:relative;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:9px 16px;border-radius:var(--r-pill);border:1px solid var(--border);background:rgba(10,14,26,.5);color:var(--muted);cursor:pointer;transition:all .2s;line-height:1.1;}
.mode-chip.on{background:var(--gold);color:var(--void);border-color:var(--gold);}
.mode-chip.soon{opacity:.6;cursor:not-allowed;}
.mode-chip.soon span{display:block;font-size:8px;letter-spacing:.14em;color:var(--gold);opacity:.8;margin-top:2px;}
.mode-chip.soon:hover{opacity:.8;border-color:var(--gold-dim);}

ajo y un crack puntúa como un crack.",en:"Each player has a <b>rating (0–99)</b> based on <b>position</b>, <b>scoring rate</b> (goals per game), <b>real weight</b> in that team (regular starter vs. sub) and <b>historical pedigree</b>. So a sub with 3 games scores low and a star scores like a star.",pt:"Cada jogador tem uma <b>avaliação (0–99)</b> segundo a <b>posição</b>, o <b>ritmo goleador</b> (golos por jogo), o <b>peso real</b> naquela equipa (titular vs. suplente) e o <b>cartaz histórico</b>. Por isso um suplente com 3 jogos pontua baixo e um craque pontua como craque.",fr:"Chaque joueur a une <b>note (0–99)</b> selon son <b>poste</b>, son <b>rendement</b> (buts par match), son <b>poids réel</b> dans l’équipe (titulaire vs. remplaçant) et son <b>aura historique</b>. Un remplaçant à 3 matchs note bas, un crack note comme un crack."},"scoring.rating.title":{es:"De dónde sale la valoración de cada jugador",en:"Where each player’s rating comes from",pt:"De onde vem a avaliação de cada jogador",fr:"D’où vient la note de chaque joueur"},"scoring.r.pos.n":{es:"Posición",en:"Position",pt:"Posição",fr:"Poste"},"scoring.r.pos.d":{es:"Cada puesto se mide distinto: a un portero o defensa le pesa la solidez y los partidos; a un delantero, el gol.",en:"Each role is measured differently: keepers and defenders are judged on solidity and games; forwards on goals.",pt:"Cada posição mede-se de forma diferente: guarda-redes e defesas pela solidez e jogos; avançados pelo golo.",fr:"Chaque poste se mesure différemment : gardiens et défenseurs sur la solidité et les matchs ; attaquants sur les buts."},"scoring.r.goals.n":{es:"Ritmo goleador",en:"Scoring rate",pt:"Ritmo goleador",fr:"Rendement"},"scoring.r.goals.d":{es:"Goles por partido en aquel club, no solo el total. Marcar mucho jugando poco vale más que un total inflado a base de temporadas.",en:"Goals per game at that club, not just the total. Scoring a lot in few games beats a total padded over many seasons.",pt:"Golos por jogo naquele clube, não só o total. Marcar muito jogando pouco vale mais que um total inflado por épocas.",fr:"Buts par match dans ce club, pas seulement le total. Beaucoup marquer en peu de matchs vaut mieux qu’un total gonflé."},"scoring.r.weight.n":{es:"Peso real en su equipo",en:"Real weight in the team",pt:"Peso real na equipa",fr:"Poids réel dans l’équipe"},"scoring.r.weight.d":{es:"Su titularidad comparada con el resto de su propia plantilla: un fijo puntúa alto; un suplente de 3 partidos, bajo. Funciona igual con datos de Liga, Champions o curados.",en:"How much of a starter he was compared to his own squad: a regular scores high, a 3-game sub low. Works the same with league, Champions or curated data.",pt:"Quão titular era comparado com o seu próprio plantel: um fixo pontua alto; um suplente de 3 jogos, baixo. Funciona igual com dados de Liga, Champions ou curados.",fr:"Son statut de titulaire comparé à son propre effectif : un cadre note haut, un remplaçant à 3 matchs bas. Idem avec des données de championnat, de Ligue des champions ou curées."},"scoring.r.legends.n":{es:"Suelo de leyendas",en:"Legend floor",pt:"Piso de lendas",fr:"Plancher des légendes"},"scoring.r.legends.d":{es:"Unos 180 cracks históricos tienen un mínimo garantizado: así Zidane, Messi o Hierro puntúan como cracks aunque los datos de partidos/goles se queden cortos para creadores y defensas.",en:"Around 180 historic stars have a guaranteed minimum: so Zidane, Messi or Hierro rate like stars even when games/goals undersell playmakers and defenders.",pt:"Cerca de 180 craques históricos têm um mínimo garantido: assim Zidane, Messi ou Hierro pontuam como craques mesmo quando jogos/golos ficam curtos para criadores e defesas.",fr:"Environ 180 cracks historiques ont un minimum garanti : ainsi Zidane, Messi ou Hierro notent comme des cracks même quand matchs/buts sous-estiment meneurs et défenseurs."},"scoring.rating.note":{es:"La media de la liga se sitúa en una valoración de <b>~68</b>: ahí un equipo está en mitad de tabla y mete tantos goles como encaja. Por debajo, encaja muchos más de los que mete (y baja); por encima, lo contrario. Por eso un equipo de verdad flojo da resultados de verdad malos.",en:"The league average sits at a rating of <b>~68</b>: there a team is mid-table and scores as many as it concedes. Below that it concedes far more than it scores (and goes down); above, the opposite. That’s why a genuinely weak team gets genuinely bad results.",pt:"A média da liga fica numa avaliação de <b>~68</b>: aí uma equipa está a meio da tabela e marca tantos golos quantos sofre. Abaixo, sofre muito mais do que marca (e desce); acima, o contrário. Por isso uma equipa fraca a sério dá resultados maus a sério.",fr:"La moyenne du championnat se situe à une note de <b>~68</b> : là une équipe est en milieu de tableau et marque autant qu’elle encaisse. En dessous, elle encaisse bien plus qu’elle ne marque (et descend) ; au-dessus, l’inverse. C’est pourquoi une équipe vraiment faible obtient des résultats vraiment mauvais."},"scoring.p2":{es:"Cuando completas tu XI, <b>no se hace una media simple</b>: se evalúa el equipo por líneas y se <b>simula una temporada entera de 38 jornadas miles de veces</b> (modelo de goles tipo Poisson) para estimar cuántos puntos haría y qué probabilidad tiene de acabar <b>INVICTO (38-0)</b>.",en:"When your XI is complete, <b>it’s not a simple average</b>: the team is evaluated by lines and a <b>full 38-game season is simulated thousands of times</b> (Poisson goal model) to estimate points and the chance of finishing <b>UNBEATEN (38-0)</b>.",pt:"Quando completas o XI, <b>não é uma média simples</b>: avalia-se por linhas e <b>simula-se uma época inteira de 38 jornadas milhares de vezes</b> (modelo Poisson) para estimar pontos e a hipótese de acabar <b>INVICTO (38-0)</b>.",fr:"Une fois ton XI complet, <b>pas de simple moyenne</b> : l’équipe est évaluée par lignes et une <b>saison de 38 journées est simulée des milliers de fois</b> (modèle de Poisson) pour estimer les points et la chance de finir <b>INVAINCU (38-0)</b>."},"scoring.factors":{es:"Factores que entran en la evaluación",en:"Factors in the evaluation",pt:"Fatores da avaliação",fr:"Facteurs de l’évaluation"},"scoring.f.attack":{es:"Pegada de la delantera + creación del medio + llegada lateral.",en:"Striker punch + midfield creation + wing arrivals.",pt:"Finalização do ataque + criação do meio + chegada das alas.",fr:"Force des attaquants + création au milieu + montées des côtés."},"scoring.f.defense":{es:"Portero + línea defensiva + cobertura del mediocampo.",en:"Keeper + back line + midfield cover.",pt:"Guarda-redes + linha defensiva + cobertura do meio.",fr:"Gardien + ligne défensive + couverture du milieu."},"scoring.f.control":{es:"Dominio del centro del campo: quién manda el partido.",en:"Midfield dominance: who runs the game.",pt:"Domínio do meio-campo: quem manda no jogo.",fr:"Maîtrise du milieu : qui dicte le jeu."},"scoring.f.chem":{es:"Bonus por compartir época y nacionalidad (y al máximo si además coincidieron en el mismo club).",en:"Bonus for sharing era and nationality (and highest if they also played at the same club).",pt:"Bónus por partilharem época e nacionalidade (e máximo se ainda coincidiram no mesmo clube).",fr:"Bonus pour une même époque et nationalité (et maximum s’ils ont aussi joué au même club)."},"scoring.f.balance":{es:"Penaliza líneas flojas o descompensadas. Un buen equipo no tiene agujeros.",en:"Penalizes weak or unbalanced lines. A good team has no holes.",pt:"Penaliza linhas fracas ou desequilibradas. Boa equipa não tem buracos.",fr:"Pénalise les lignes faibles ou déséquilibrées. Une bonne équipe n’a pas de trou."},"scoring.f.stars":{es:"Los cracks deciden partidos: tus dos mejores suben la nota.",en:"Stars decide games: your top two lift the score.",pt:"Os craques decidem jogos: os teus dois melhores sobem a nota.",fr:"Les cracks décident des matchs : tes deux meilleurs font monter la note."},"scoring.p3":{es:"El resultado final te dice los <b>puntos esperados</b>, el <b>balance</b> (victorias-empates-derrotas), los goles y, lo más difícil de todo, tu <b>probabilidad de hacer el 38-0</b>.",en:"The final result shows your <b>expected points</b>, the <b>record</b> (wins-draws-losses), the goals and, hardest of all, your <b>chance of going 38-0</b>.",pt:"O resultado final mostra os <b>pontos esperados</b>, o <b>balanço</b> (vitórias-empates-derrotas), os golos e, o mais difícil, a tua <b>probabilidade de fazer o 38-0</b>.",fr:"Le résultat final montre tes <b>points attendus</b>, le <b>bilan</b> (victoires-nuls-défaites), les buts et, le plus dur, ta <b>probabilité de faire 38-0</b>."},"scoring.ok":{es:"ENTENDIDO",en:"GOT IT",pt:"PERCEBI",fr:"COMPRIS"},"cookie.text":{es:"Usamos cookies propias y de terceros para medir la audiencia con Google Analytics y, en el futuro, mostrar publicidad. Puedes aceptarlas o rechazarlas. Más información en ",en:"We use first- and third-party cookies to measure audience with Google Analytics and, in the future, show ads. You can accept or reject them. More info in ",pt:"Usamos cookies próprias e de terceiros para medir audiência com o Google Analytics e, no futuro, mostrar publicidade. Podes aceitar ou rejeitar. Mais info em ",fr:"Nous utilisons des cookies (propres et tiers) pour mesurer l’audience via Google Analytics et, à l’avenir, afficher des publicités. Tu peux accepter ou refuser. Plus d’infos dans "},"cookie.policy":{es:"Política de cookies",en:"Cookie policy",pt:"Política de cookies",fr:"Politique de cookies"},"cookie.reject":{es:"Rechazar",en:"Reject",pt:"Rejeitar",fr:"Refuser"},"cookie.accept":{es:"Aceptar",en:"Accept",pt:"Aceitar",fr:"Accepter"},"footer.indep":{es:"INVICTOS - proyecto independiente de fans. No afiliado a LaLiga, clubes, federaciones ni UEFA.",en:"INVICTOS - independent fan project. Not affiliated with LaLiga, clubs, federations or UEFA.",pt:"INVICTOS - projeto independente de fãs. Sem afiliação à LaLiga, c
